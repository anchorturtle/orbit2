<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit — jestR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root{
    --grain-opacity:.07;--scanline-opacity:.045;--vignette-strength:.72;--aberration:1.5px;
    --jestr-blue:#2D5BFF;--jestr-green:#00C896;--jestr-purple:#7B2FFF;--jestr-red:#E8003D;
    --baby-blue:#7EC8E3;
  }
  *{box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:#06040f;margin:0;overflow:hidden;color:#e9e1de;}
  #space-bg{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 80% 60% at 60% 40%,rgba(60,20,120,.55) 0%,transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 70%,rgba(0,80,180,.35) 0%,transparent 65%),
      radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,160,120,.2) 0%,transparent 60%),
      #06040f;
  }
  #stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain-shift .1s steps(1) infinite;mix-blend-mode:overlay;}
  @keyframes grain-shift{0%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0,0)}}
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:199;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,.018) 2px,rgba(0,255,180,.018) 3px);}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:198;background:radial-gradient(ellipse at center,transparent 32%,rgba(3,2,10,var(--vignette-strength)) 100%);}
  .phosphor{text-shadow:0 0 8px rgba(0,200,150,.4),0 0 2px rgba(0,200,150,.2);}
  .planet-glow{filter:blur(55px);background:radial-gradient(circle,var(--jestr-purple) 0%,var(--jestr-blue) 60%,var(--jestr-green) 100%);animation:ppulse 9s infinite alternate;opacity:.7;}
  @keyframes ppulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.08);opacity:.82}}
  .depth-far{filter:blur(3px) saturate(.5) brightness(.7);}.depth-mid{filter:blur(.6px) saturate(.9);}.depth-near{filter:none;}
  .container-texture{position:relative;}
  .container-texture::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.04;border-radius:inherit;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");}
  @keyframes vhs-flicker{0%,96%,100%{opacity:1}97%{opacity:.88}98%{opacity:1}99%{opacity:.92}}
  .vhs-flicker{animation:vhs-flicker 5s infinite;}
  .tape-counter{font-variant-numeric:tabular-nums;letter-spacing:.15em;font-size:9px;color:rgba(0,200,150,.65);font-weight:700;text-transform:uppercase;}
  .no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
  .track-item.active{background:rgba(45,91,255,.1)!important;border-color:rgba(123,47,255,.3)!important;}
  .track-item.active .track-title{color:#e9e1de!important;}
  .track-item.active .track-artist{color:var(--jestr-green)!important;}
  .ring-far{animation:ring-expand 12s linear infinite;}.ring-near{animation:ring-expand 9s linear infinite 1.5s;}
  @keyframes ring-expand{0%{transform:scale(.4);opacity:.6}80%{opacity:.1}100%{transform:scale(1.6);opacity:0}}
  #mobile-drawer{transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
  #mobile-drawer.open{transform:translateX(0);}
  #drawer-overlay{opacity:0;pointer-events:none;transition:opacity .3s;}
  #drawer-overlay.open{opacity:1;pointer-events:all;}
  .ctrl-btn{
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;
    cursor:pointer;padding:5px;display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s,transform .1s,box-shadow .2s;
    backdrop-filter:blur(8px);color:var(--baby-blue);
  }
  .ctrl-btn:hover{background:rgba(126,200,227,.12);border-color:rgba(126,200,227,.35);box-shadow:0 0 10px rgba(126,200,227,.2);transform:scale(1.08);}
  .ctrl-btn:active{transform:scale(.95);}
  .play-btn{
    background:linear-gradient(135deg,var(--jestr-purple),var(--jestr-blue));
    box-shadow:0 0 22px rgba(123,47,255,.55),inset 0 1px 0 rgba(255,255,255,.15);
    transition:box-shadow .2s,transform .1s;border:none;cursor:pointer;
  }
  .play-btn:hover{box-shadow:0 0 34px rgba(45,91,255,.75),inset 0 1px 0 rgba(255,255,255,.2);}

  /* ── PROGRESS ── */
  .progress-wrap{position:relative;height:18px;display:flex;align-items:center;cursor:pointer;flex:1;user-select:none;-webkit-user-select:none;touch-action:none;}
  .progress-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.1);transition:height .12s;}
  .progress-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:linear-gradient(90deg,var(--jestr-purple),var(--jestr-blue),var(--jestr-green));pointer-events:none;transition:height .12s;}
  .progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(123,47,255,.5),0 2px 8px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .15s,transform .1s;z-index:2;}
  .progress-wrap:hover .progress-thumb,.progress-wrap.dragging .progress-thumb{opacity:1;}
  .progress-wrap:hover .progress-track-bg,.progress-wrap:hover .progress-fill-bar,.progress-wrap.dragging .progress-track-bg,.progress-wrap.dragging .progress-fill-bar{height:5px;}
  .progress-wrap.dragging .progress-thumb{transform:translate(-50%,-50%) scale(1.2);}

  /* ── VOLUME ── */
  .volume-wrap{position:relative;height:18px;display:flex;align-items:center;cursor:pointer;flex:1;user-select:none;-webkit-user-select:none;touch-action:none;}
  .volume-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.1);transition:height .12s;}
  .volume-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:var(--jestr-green);pointer-events:none;transition:height .12s;}
  .volume-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(0,200,150,.5),0 2px 8px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .15s,transform .1s;z-index:2;}
  .volume-wrap:hover .volume-thumb,.volume-wrap.dragging .volume-thumb{opacity:1;}
  .volume-wrap:hover .volume-track-bg,.volume-wrap:hover .volume-fill-bar,.volume-wrap.dragging .volume-track-bg,.volume-wrap.dragging .volume-fill-bar{height:5px;}
  .volume-wrap.dragging .volume-thumb{transform:translate(-50%,-50%) scale(1.2);}

  .search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(123,47,255,.2);border-radius:10px;padding:0 10px;height:36px;transition:border-color .2s,box-shadow .2s;}
  .search-wrap:focus-within{border-color:rgba(123,47,255,.55);box-shadow:0 0 0 3px rgba(123,47,255,.08);}
  .search-wrap .material-symbols-outlined{font-size:16px;color:rgba(110,104,117,.6);flex-shrink:0;}
  .search-wrap input{background:transparent!important;border:none!important;outline:none!important;box-shadow:none!important;-webkit-appearance:none!important;appearance:none!important;color:#e9e1de;font-size:12px;font-family:inherit;width:100%;letter-spacing:.02em;padding:0;}
  .search-wrap input::placeholder{color:rgba(110,104,117,.45);}
  .search-wrap input:focus{outline:none!important;box-shadow:none!important;}

  #float-player{
    position:fixed;z-index:300;left:320px;bottom:20px;
    width:360px;min-width:280px;max-width:680px;
    background:rgba(8,5,22,.52);
    backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
    -webkit-backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
    border:1px solid rgba(150,100,255,.3);border-radius:18px;
    box-shadow:0 8px 48px rgba(0,0,0,.65),0 0 0 1px rgba(45,91,255,.07),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3);
    padding:10px 14px 12px;user-select:none;overflow:hidden;
  }
  @media (max-width:767px){
    body{overflow:hidden;}
    #float-player{
      position:fixed!important;left:0!important;right:0!important;bottom:0!important;top:auto!important;
      transform:none!important;width:100%!important;max-width:100%!important;min-width:0!important;
      border-radius:16px 16px 0 0!important;
      border-left:none!important;border-right:none!important;border-bottom:none!important;
    }
    main.mobile-main{
      display:flex!important;flex-direction:column!important;
      position:fixed!important;top:56px!important;left:0!important;right:0!important;
      bottom:var(--player-height,140px)!important;overflow:hidden!important;
    }
    .mobile-planet-section{flex-shrink:0;padding:16px 0 12px;display:flex;flex-direction:column;align-items:center;}
    .mobile-tracklist-section{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 16px;}
    .mobile-tracklist-section::-webkit-scrollbar{display:none;}
    .mobile-tracklist-section{-ms-overflow-style:none;scrollbar-width:none;}
  }
  #float-player::before{
    content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
    background:
      radial-gradient(circle 18px at 0% 0%,rgba(126,200,227,.3) 0%,transparent 70%),
      radial-gradient(circle 18px at 100% 0%,rgba(126,200,227,.3) 0%,transparent 70%),
      radial-gradient(circle 18px at 0% 100%,rgba(126,200,227,.3) 0%,transparent 70%),
      radial-gradient(circle 18px at 100% 100%,rgba(126,200,227,.3) 0%,transparent 70%);
    opacity:.65;transition:opacity .3s;z-index:0;
  }
  #float-player:hover::before{opacity:1;}
  #float-player.is-positioned{bottom:auto;}
  #fp-handle{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:8px;cursor:grab;padding-bottom:6px;
    border-bottom:1px solid rgba(150,100,255,.12);position:relative;z-index:1;
  }
  #fp-handle:active{cursor:grabbing;}
  .fp-resize{position:absolute;width:20px;height:20px;z-index:10;opacity:0;}
  .fp-resize.nw{top:0;left:0;cursor:nw-resize;}.fp-resize.ne{top:0;right:0;cursor:ne-resize;}
  .fp-resize.sw{bottom:0;left:0;cursor:sw-resize;}.fp-resize.se{bottom:0;right:0;cursor:se-resize;}
  #fp-info{display:flex;align-items:center;gap:10px;margin-bottom:8px;position:relative;z-index:1;}
  #fp-art{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(123,47,255,.22);border:1px solid rgba(123,47,255,.35);box-shadow:0 0 16px rgba(123,47,255,.25),inset 0 1px 0 rgba(255,255,255,.1);}
  #fp-controls{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;position:relative;z-index:1;}
  #fp-progress,#fp-volume{
    display:flex;align-items:center;gap:7px;position:relative;z-index:1;
    background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:5px 10px;
  }
  #fp-progress{margin-bottom:6px;}

  /* ── PLANET TEXT ── */
  #focal-title,#focal-title-mobile{
    position:relative;
    isolation:isolate;
    z-index:10;
  }
</style>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{
    colors:{"surface":"#06040f","surface-container-low":"#0e0c1a","surface-container":"#131120","surface-container-high":"#1c1930","on-surface":"#e9e1de","outline":"#6e6875","background":"#06040f"},
    fontFamily:{headline:["Plus Jakarta Sans"],body:["Plus Jakarta Sans"]},
    borderRadius:{DEFAULT:"0.75rem",lg:"1.5rem",xl:"2.5rem",full:"9999px"},
  }}}
</script>
</head>
<body>
<div id="space-bg"></div>
<canvas id="stars-canvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain-overlay"></div>
<audio id="audio-player" preload="auto"></audio>

<aside class="hidden md:flex h-full w-64 fixed left-0 top-0 z-40 flex-col border-r container-texture depth-near"
  style="background:rgba(6,4,18,.82);backdrop-filter:blur(24px);border-color:rgba(100,60,200,.14);padding:24px 20px;gap:16px">
  <div style="text-align:center;margin-bottom:4px">
    <h1 class="text-2xl font-black tracking-tighter italic vhs-flicker phosphor" style="color:var(--jestr-purple);line-height:1">Orbit</h1>
    <p class="font-bold tracking-[0.3em] text-[8px] uppercase phosphor" style="color:rgba(0,200,150,.6);margin-top:2px">Cosmic Hi-Fi</p>
  </div>
  <button class="flex items-center gap-3 px-3 py-2 rounded-lg w-full text-left"
    style="background:rgba(123,47,255,.14);border:1px solid rgba(123,47,255,.2);color:rgba(200,180,255,.9);font-weight:700;font-size:12px;backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)">
    <span class="material-symbols-outlined" style="font-size:18px">library_music</span>Tracks
  </button>
  <div style="height:1px;background:rgba(100,60,200,.14)"></div>
  <div class="search-wrap">
    <span class="material-symbols-outlined">search</span>
    <input id="search-input" placeholder="Search tracks…" type="text" autocomplete="off"/>
  </div>
  <div class="flex items-center justify-between" style="padding:0 2px">
    <span class="tape-counter">Tracklist</span>
    <span class="tape-counter" id="track-count">12 TRK</span>
  </div>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="sidebar-tracklist"></div>
</aside>

<div id="drawer-overlay" class="fixed inset-0 bg-black/70 z-40 md:hidden"></div>
<aside id="mobile-drawer" class="fixed left-0 top-0 h-full w-64 z-50 flex flex-col p-5 gap-4 md:hidden container-texture"
  style="background:rgba(6,4,18,.92);backdrop-filter:blur(24px)">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-black tracking-tighter italic vhs-flicker phosphor" style="color:var(--jestr-purple)">Orbit</h1>
      <p class="text-[8px] font-bold tracking-[0.3em] uppercase phosphor" style="color:rgba(0,200,150,.6)">Cosmic Hi-Fi</p>
    </div>
    <button id="close-drawer" style="color:#6e6875"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div style="height:1px;background:rgba(100,60,200,.14)"></div>
  <span class="tape-counter" style="padding:0 4px">Tracklist</span>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="mobile-tracklist"></div>
</aside>

<header class="md:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-5 py-3.5 border-b depth-near"
  style="background:rgba(6,4,18,.8);backdrop-filter:blur(20px);border-color:rgba(100,60,200,.1)">
  <button id="open-drawer" style="color:#6e6875"><span class="material-symbols-outlined">menu</span></button>
  <h1 class="text-lg font-black tracking-tighter italic vhs-flicker phosphor" style="color:var(--jestr-purple)">Orbit</h1>
  <div class="w-7"></div>
</header>

<main class="hidden md:flex h-screen items-center justify-center overflow-hidden relative" style="margin-left:16rem;padding:40px">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none depth-far">
    <div class="absolute w-[640px] h-[640px] rounded-full ring-far" style="border:1px solid rgba(45,91,255,.07)"></div>
    <div class="absolute w-[420px] h-[420px] rounded-full ring-near" style="border:1px solid rgba(123,47,255,.09)"></div>
  </div>
  <div class="relative flex items-center justify-center" style="flex:1">
    <div class="relative w-[360px] h-[360px]">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden shadow-2xl"
        style="background:rgba(15,10,35,.35);backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(123,47,255,.15)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 0);background-size:12px 12px;opacity:.2"></div>
        <div class="absolute inset-0" style="background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.008) 18px,rgba(255,255,255,.008) 19px)"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8" style="z-index:10;position:absolute;">
        <p class="tape-counter phosphor" style="margin-bottom:12px">NOW PLAYING</p>
        <h2 id="focal-title"
          class="font-black italic tracking-tighter leading-none uppercase"
          style="font-size:2.8rem;color:#e9e1de;text-shadow:0 0 40px rgba(123,47,255,.5);margin-bottom:12px;position:relative;z-index:10">
          —
        </h2>
        <p id="focal-artist" class="font-bold tracking-[0.5em] uppercase phosphor" style="font-size:10px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div class="flex flex-col" style="width:240px;gap:16px;z-index:20;position:relative;">
    <div class="flex items-center justify-between" style="padding-bottom:12px;border-bottom:1px solid rgba(100,60,200,.12)">
      <span class="tape-counter">Up Next</span>
      <span class="material-symbols-outlined" style="font-size:14px;color:var(--jestr-blue)">auto_awesome</span>
    </div>
    <div id="upnext-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</main>

<main class="md:hidden mobile-main">
  <div class="mobile-planet-section relative">
    <div class="absolute w-56 h-56 rounded-full ring-far depth-far" style="border:1px solid rgba(45,91,255,.07)"></div>
    <div class="relative w-44 h-44">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden"
        style="background:rgba(15,10,35,.3);backdrop-filter:blur(16px);border:1px solid rgba(123,47,255,.12)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 0);background-size:10px 10px;opacity:.15"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-4" style="z-index:10;">
        <p class="tape-counter" style="font-size:7px;margin-bottom:4px">NOW PLAYING</p>
        <h2 id="focal-title-mobile"
          class="text-xl font-black italic tracking-tighter leading-none uppercase"
          style="color:#e9e1de;margin-bottom:4px;position:relative;z-index:10">
          —
        </h2>
        <p id="focal-artist-mobile" class="font-bold tracking-widest uppercase phosphor" style="font-size:8px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div class="mobile-tracklist-section">
    <span class="tape-counter" style="display:block;margin-bottom:12px">All Tracks</span>
    <div style="display:flex;flex-direction:column;gap:4px" id="mobile-main-tracklist"></div>
  </div>
</main>

<!-- ══ FLOATING PLAYER ══ -->
<div id="float-player" class="container-texture">
  <div class="fp-resize nw" data-dir="nw"></div>
  <div class="fp-resize ne" data-dir="ne"></div>
  <div class="fp-resize sw" data-dir="sw"></div>
  <div class="fp-resize se" data-dir="se"></div>

  <div id="fp-handle">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="material-symbols-outlined" style="font-size:13px;color:rgba(150,100,255,.55)">drag_indicator</span>
      <span class="tape-counter" style="font-size:8px">Orbit Player</span>
    </div>
    <button id="btn-download" class="ctrl-btn" style="background:transparent;border-color:transparent" title="Download">
      <span class="material-symbols-outlined" style="font-size:15px">download</span>
    </button>
  </div>

  <div id="fp-info">
    <div id="fp-art">
      <span class="material-symbols-outlined" style="font-size:18px;color:var(--jestr-purple);font-variation-settings:'FILL' 1">music_note</span>
    </div>
    <div style="flex:1;min-width:0">
      <p id="fp-title" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#e9e1de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">No Track</p>
      <p id="fp-artist" class="phosphor" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--jestr-green);margin:0">&mdash;</p>
    </div>
  </div>

  <div id="fp-controls">
    <button id="btn-shuffle" class="ctrl-btn" title="Shuffle"><span class="material-symbols-outlined" style="font-size:16px">shuffle</span></button>
    <button id="btn-prev" class="ctrl-btn" title="Prev"><span class="material-symbols-outlined" style="font-size:18px">skip_previous</span></button>
    <button id="btn-back10" class="ctrl-btn" title="-10s"><span class="material-symbols-outlined" style="font-size:17px">replay_10</span></button>
    <button id="btn-play" class="play-btn" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span id="play-icon" class="material-symbols-outlined text-white" style="font-size:22px;font-variation-settings:'FILL' 1">play_arrow</span>
    </button>
    <button id="btn-fwd10" class="ctrl-btn" title="+10s"><span class="material-symbols-outlined" style="font-size:17px">forward_10</span></button>
    <button id="btn-next" class="ctrl-btn" title="Next"><span class="material-symbols-outlined" style="font-size:18px">skip_next</span></button>
    <button id="btn-repeat" class="ctrl-btn" title="Repeat"><span id="repeat-icon" class="material-symbols-outlined" style="font-size:16px">repeat</span></button>
  </div>

  <div id="fp-progress">
    <span id="time-current" class="tape-counter" style="width:30px;flex-shrink:0;font-size:8px">0:00</span>
    <div class="progress-wrap" id="progress-rail">
      <div class="progress-track-bg"></div>
      <div class="progress-fill-bar" id="progress-fill" style="width:0%"></div>
      <div class="progress-thumb" id="progress-thumb"></div>
    </div>
    <span id="time-total" class="tape-counter" style="width:30px;flex-shrink:0;text-align:right;font-size:8px">0:00</span>
  </div>

  <div id="fp-volume">
    <span id="vol-icon" class="material-symbols-outlined" style="font-size:14px;color:rgba(0,200,150,.55);flex-shrink:0">volume_up</span>
    <div class="volume-wrap" id="volume-rail">
      <div class="volume-track-bg"></div>
      <div class="volume-fill-bar" id="volume-fill" style="width:80%"></div>
      <div class="volume-thumb" id="volume-thumb"></div>
    </div>
    <span class="tape-counter" style="width:30px;flex-shrink:0;text-align:right;font-size:8px" id="volume-pct">80%</span>
  </div>
</div>

<script>
  /* ── STARS ── */
  (function(){
    const c=document.getElementById("stars-canvas"),ctx=c.getContext("2d");let W,H,stars=[];
    function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    function mkStars(){stars=[];const n=Math.floor((W*H)/2800);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.15,a:Math.random(),da:(Math.random()-.5)*.005,speed:Math.random()*.035+.004});}
    function draw(){ctx.clearRect(0,0,W,H);for(const s of stars){s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;s.y+=s.speed;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,210,255,${Math.max(0,Math.min(1,s.a))})`;ctx.fill();}requestAnimationFrame(draw);}
    resize();mkStars();draw();window.addEventListener("resize",()=>{resize();mkStars();});
  })();

  function updatePlayerHeightVar(){
    if(window.innerWidth>=768)return;
    const fp=document.getElementById("float-player");
    if(fp)document.documentElement.style.setProperty("--player-height",fp.offsetHeight+"px");
  }
  window.addEventListener("resize",updatePlayerHeightVar);
  requestAnimationFrame(()=>requestAnimationFrame(updatePlayerHeightVar));

  const TRACKS=[
    {title:"Geronimo",                  artist:"jestR",file:"11 - Geronimo- jestR - 2020.mp3"},
    {title:"Mile High",                 artist:"jestR",file:"3 - Mile High- jestR - 2020.mp3"},
    {title:"Follow The Flow",           artist:"jestR",file:"Mp3-FollowTheFlow.mp3"},
    {title:"Soul Seer",                 artist:"jestR",file:"Mp3-SoulSeer.mp3"},
    {title:"Peace",                     artist:"jestR",file:"Peace.mp3"},
    {title:"Strider",                   artist:"jestR",file:"Strider.mp3"},
    {title:"Insane Membrane",           artist:"jestR",file:"Insane_membrane.mp3"},
    {title:"News",                      artist:"jestR",file:"Newsss.mp3"},
    {title:"Wheels",                    artist:"jestR",file:"mp3Wheels-36.mp3"},
    {title:"Pop",                       artist:"jestR",file:"pop.mp3"},
    {title:"The Sum Of Hippy Thoughts", artist:"jestR",file:"the sum of hippy thoughts - Output - Stereo Out.mp3"},
    {title:"What Dreams May Come",      artist:"jestR",file:"what_dreams_may_comewavy.wav"},
  ];

  const audio=document.getElementById("audio-player");
  let currentIndex=0,isPlaying=false,isShuffle=false,repeatMode=0;
  let seekOnReady=null,isSeeking=false,durationPollTimer=null;

  /* ── DRAG + RESIZE ── */
  (function(){
    const fp=document.getElementById("float-player"),handle=document.getElementById("fp-handle");
    let mode=null,startX,startY,startL,startT,startW,startH;
    function isMobile(){return window.innerWidth<768;}
    function getRect(){return fp.getBoundingClientRect();}
    function pinPosition(){if(isMobile())return;if(!fp.classList.contains("is-positioned")){const r=getRect();fp.style.bottom="";fp.style.transform="";fp.style.left=r.left+"px";fp.style.top=r.top+"px";fp.style.width=r.width+"px";fp.classList.add("is-positioned");}}
    function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
    function onDown(e,m){if(isMobile())return;pinPosition();const r=getRect();mode=m;const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;startX=cx;startY=cy;startL=r.left;startT=r.top;startW=r.width;startH=r.height;e.preventDefault();}
    function onMove(e){if(!mode)return;const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY,dx=cx-startX,dy=cy-startY,mw=280,mh=120,vw=window.innerWidth,vh=window.innerHeight;if(mode==='drag'){fp.style.left=clamp(startL+dx,0,vw-startW)+"px";fp.style.top=clamp(startT+dy,0,vh-startH)+"px";}else{let l=startL,t=startT,w=startW,h=startH;if(mode==='se'){w=clamp(startW+dx,mw,680);h=clamp(startH+dy,mh,600);}if(mode==='sw'){const nw=clamp(startW-dx,mw,680);l=startL+startW-nw;w=nw;h=clamp(startH+dy,mh,600);}if(mode==='ne'){w=clamp(startW+dx,mw,680);const nh=clamp(startH-dy,mh,600);t=startT+startH-nh;h=nh;}if(mode==='nw'){const nw=clamp(startW-dx,mw,680);l=startL+startW-nw;w=nw;const nh=clamp(startH-dy,mh,600);t=startT+startH-nh;h=nh;}fp.style.left=l+"px";fp.style.top=t+"px";fp.style.width=w+"px";fp.style.height=h+"px";}}
    function onUp(){mode=null;}
    handle.addEventListener("mousedown",e=>onDown(e,'drag'));handle.addEventListener("touchstart",e=>onDown(e,'drag'),{passive:false});
    fp.querySelectorAll(".fp-resize").forEach(el=>{el.addEventListener("mousedown",e=>{onDown(e,el.dataset.dir);e.stopPropagation();});el.addEventListener("touchstart",e=>{onDown(e,el.dataset.dir);e.stopPropagation();},{passive:false});});
    window.addEventListener("mousemove",onMove);window.addEventListener("touchmove",e=>{if(mode)onMove(e);},{passive:true});window.addEventListener("mouseup",onUp);window.addEventListener("touchend",onUp);
  })();

  function fmt(s){if(s===null||s===undefined||isNaN(s)||!isFinite(s)||s<0)return"0:00";return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  }
  function updateTitle(id,text){
    const el=document.getElementById(id);
    if(!el)return;
    el.textContent=text;
  }
  function downloadCurrent(){const t=TRACKS[currentIndex];const a=document.createElement("a");a.href=t.file;a.download=t.file;a.click();}
  function isGoodDuration(d){return typeof d==="number"&&isFinite(d)&&d>0&&d<18000;}
  function tryUpdateDuration(){const dur=audio.duration;if(isGoodDuration(dur)){document.getElementById("time-total").textContent=fmt(dur);return true;}return false;}
  function startDurationPoll(){if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}const deadline=Date.now()+30000;durationPollTimer=setInterval(()=>{if(tryUpdateDuration()){clearInterval(durationPollTimer);durationPollTimer=null;return;}if(Date.now()>=deadline){clearInterval(durationPollTimer);durationPollTimer=null;}},500);}
  function applySavedSeek(){if(seekOnReady!==null&&audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=seekOnReady*audio.duration;seekOnReady=null;tryUpdateDuration();}}
  audio.addEventListener("loadedmetadata",()=>{tryUpdateDuration();applySavedSeek();});
  audio.addEventListener("canplay",()=>{tryUpdateDuration();applySavedSeek();});
  audio.addEventListener("durationchange",()=>{tryUpdateDuration();applySavedSeek();});

  function setProgress(pct){document.getElementById("progress-fill").style.width=pct+"%";document.getElementById("progress-thumb").style.left=pct+"%";}
  function seekToPct(pct){pct=Math.max(0,Math.min(1,pct));setProgress(pct*100);if(audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=pct*audio.duration;seekOnReady=null;}else{seekOnReady=pct;}}
  function skip(sec){if(audio.readyState>=1&&isGoodDuration(audio.duration))audio.currentTime=Math.max(0,Math.min(audio.duration,(audio.currentTime||0)+sec));}
  function clientXToFraction(clientX,rail){const r=rail.getBoundingClientRect();return Math.max(0,Math.min(1,(clientX-r.left)/r.width));}

  function makeScrubber(railId,onScrub,onEnd){
    const rail=document.getElementById(railId);let drag=false;
    function start(x){drag=true;rail.classList.add("dragging");onScrub(clientXToFraction(x,rail));}
    function move(x){if(!drag)return;onScrub(clientXToFraction(x,rail));}
    function end(){if(!drag)return;drag=false;rail.classList.remove("dragging");if(onEnd)onEnd();}
    rail.addEventListener("mousedown",e=>{start(e.clientX);e.preventDefault();});
    window.addEventListener("mousemove",e=>{if(drag)move(e.clientX);});
    window.addEventListener("mouseup",end);
    rail.addEventListener("touchstart",e=>{start(e.touches[0].clientX);e.preventDefault();},{passive:false});
    window.addEventListener("touchmove",e=>{if(drag){e.preventDefault();move(e.touches[0].clientX);}},{passive:false});
    window.addEventListener("touchend",end);
  }
  makeScrubber("progress-rail",pct=>{isSeeking=true;seekToPct(pct);},()=>{isSeeking=false;});

  /* ── VOLUME ── */
  function volIcon(pct){
    if(pct===0)return"volume_off";
    if(pct<0.4)return"volume_down";
    return"volume_up";
  }
  function setVolume(pct){
    pct=Math.max(0,Math.min(1,pct));
    audio.volume=pct;
    document.getElementById("volume-fill").style.width=(pct*100)+"%";
    document.getElementById("volume-thumb").style.left=(pct*100)+"%";
    document.getElementById("volume-pct").textContent=Math.round(pct*100)+"%";
    document.getElementById("vol-icon").textContent=volIcon(pct);
  }
  makeScrubber("volume-rail",pct=>setVolume(pct));

  audio.addEventListener("timeupdate",()=>{
    const dur=audio.duration,cur=audio.currentTime;
    if(cur>0&&!isGoodDuration(dur)){if(tryUpdateDuration()&&durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}}
    if(isGoodDuration(dur)){document.getElementById("time-total").textContent=fmt(dur);document.getElementById("time-current").textContent=fmt(cur);if(!isSeeking)setProgress((cur/dur)*100);}else{document.getElementById("time-current").textContent=fmt(cur);}
  });

  audio.addEventListener("ended",()=>{
    if(repeatMode===2){audio.currentTime=0;audio.play();return;}
    if(repeatMode===1){loadTrack((currentIndex+1)%TRACKS.length,true);return;}
    if(currentIndex<TRACKS.length-1){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):currentIndex+1,true);}else{isPlaying=false;updatePlayIcons();renderAll();}
  });

  function loadTrack(index,autoplay=false){
    currentIndex=index;seekOnReady=null;isSeeking=false;
    if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}
    const t=TRACKS[index];audio.src=t.file;audio.load();startDurationPoll();
    updateTitle("focal-title",t.title);
    updateTitle("focal-title-mobile",t.title);
    ["focal-artist","focal-artist-mobile"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t.artist;});
    document.getElementById("fp-title").textContent=t.title;
    document.getElementById("fp-artist").textContent=t.artist;
    setProgress(0);document.getElementById("time-current").textContent="0:00";document.getElementById("time-total").textContent="0:00";
    renderAll();
    if(autoplay){audio.play().then(()=>{isPlaying=true;updatePlayIcons();renderAll();}).catch(()=>{});}else{isPlaying=false;}
    updatePlayIcons();
  }

  function updateRepeatUI(){const btn=document.getElementById("btn-repeat"),icon=document.getElementById("repeat-icon");if(repeatMode===0){btn.style.color="var(--baby-blue)";icon.textContent="repeat";btn.title="Repeat: Off";}else if(repeatMode===1){btn.style.color="var(--jestr-red)";icon.textContent="repeat";btn.title="Repeat: All";}else{btn.style.color="var(--jestr-red)";icon.textContent="repeat_one";btn.title="Repeat: One";}}
  function updateShuffleUI(){document.getElementById("btn-shuffle").style.color=isShuffle?"var(--jestr-red)":"var(--baby-blue)";}
  function updatePlayIcons(){document.getElementById("play-icon").textContent=isPlaying?"pause":"play_arrow";}

  function trackHTML(t,i,isActive){
    return `<div class="track-item" data-index="${i}"
      style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;
        border:1px solid ${isActive?'rgba(123,47,255,.3)':'transparent'};
        background:${isActive?'rgba(45,91,255,.1)':'transparent'};
        transition:background .15s,border-color .15s">
      <span style="font-size:9px;font-weight:700;color:#6e6875;width:16px;flex-shrink:0;text-align:right">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1;min-width:0">
        <p class="track-title" style="font-size:11px;font-weight:700;color:${isActive?'#e9e1de':'rgba(233,225,222,.45)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title}</p>
        <p class="track-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:${isActive?'var(--jestr-green)':'rgba(110,104,117,.45)'};margin:0">${t.artist}</p>
      </div>
      ${isActive&&isPlaying?'<span class="material-symbols-outlined" style="font-size:12px;color:var(--jestr-purple);flex-shrink:0">equalizer</span>':''}
    </div>`;
  }
  function renderAll(){
    const html=TRACKS.map((t,i)=>trackHTML(t,i,i===currentIndex)).join("");
    ["sidebar-tracklist","mobile-tracklist","mobile-main-tracklist"].forEach(id=>{
      const el=document.getElementById(id);if(!el)return;
      el.innerHTML=html;
      el.querySelectorAll(".track-item").forEach(item=>{
        item.addEventListener("mouseenter",()=>{if(parseInt(item.dataset.index)!==currentIndex)item.style.background="rgba(45,91,255,.06)";});
        item.addEventListener("mouseleave",()=>{if(parseInt(item.dataset.index)!==currentIndex)item.style.background="";});
        item.addEventListener("click",()=>{loadTrack(parseInt(item.dataset.index),true);closeDrawer();});
      });
    });
    const upnext=document.getElementById("upnext-list");
    if(upnext){
      upnext.innerHTML=[1,2,3].map(i=>{
        const idx=(currentIndex+i)%TRACKS.length,t=TRACKS[idx];
        return `<div data-index="${idx}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(100,60,200,.1);transition:background .15s"
          onmouseenter="this.style.background='rgba(45,91,255,.07)'" onmouseleave="this.style.background=''">
          <span style="font-size:9px;font-weight:700;color:#6e6875;flex-shrink:0">${String(i).padStart(2,"0")}</span>
          <div style="flex:1;min-width:0">
            <p style="font-size:11px;font-weight:700;color:rgba(233,225,222,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title.toUpperCase()}</p>
            <p style="font-size:8px;font-weight:700;color:rgba(0,200,150,.4);letter-spacing:.14em;margin:0">${t.artist.toUpperCase()}</p>
          </div>
        </div>`;
      }).join("");
      upnext.querySelectorAll("[data-index]").forEach(el=>{el.addEventListener("click",()=>loadTrack(parseInt(el.dataset.index),true));});
    }
  }

  function togglePlay(){if(!audio.src||audio.src===window.location.href){loadTrack(0,true);return;}if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}updatePlayIcons();renderAll();}
  function prevTrack(){if((audio.currentTime||0)>3){audio.currentTime=0;return;}loadTrack((currentIndex-1+TRACKS.length)%TRACKS.length,isPlaying);}
  function nextTrack(){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):(currentIndex+1)%TRACKS.length,isPlaying);}

  document.getElementById("btn-play").addEventListener("click",togglePlay);
  document.getElementById("btn-prev").addEventListener("click",prevTrack);
  document.getElementById("btn-next").addEventListener("click",nextTrack);
  document.getElementById("btn-back10").addEventListener("click",()=>skip(-10));
  document.getElementById("btn-fwd10").addEventListener("click",()=>skip(10));
  document.getElementById("btn-download").addEventListener("click",downloadCurrent);
  document.getElementById("btn-shuffle").addEventListener("click",()=>{isShuffle=!isShuffle;updateShuffleUI();});
  document.getElementById("btn-repeat").addEventListener("click",()=>{repeatMode=(repeatMode+1)%3;updateRepeatUI();});
  document.getElementById("search-input").addEventListener("input",e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll(".track-item").forEach(el=>{const t=TRACKS[parseInt(el.dataset.index)];el.style.display=(t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q))?"":"none";});
  });
  document.getElementById("open-drawer").addEventListener("click",()=>{document.getElementById("mobile-drawer").classList.add("open");document.getElementById("drawer-overlay").classList.add("open");});
  document.getElementById("close-drawer").addEventListener("click",closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click",closeDrawer);
  function closeDrawer(){document.getElementById("mobile-drawer").classList.remove("open");document.getElementById("drawer-overlay").classList.remove("open");}

  setVolume(0.8);
  updateRepeatUI();
  updateShuffleUI();
  loadTrack(0,false);
</script>
</body>
</html>
