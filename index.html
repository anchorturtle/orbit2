<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit — jestR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --grain-opacity:.07;--scanline-opacity:.03;--vignette-strength:.7;--aberration:1.5px;
    --jestr-blue:#2D5BFF;--jestr-green:#00C896;--jestr-purple:#7B2FFF;--jestr-red:#E8003D;
  }
  *{box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:#06040f;margin:0;overflow:hidden;color:#e9e1de;}

  /* ── SPACE BACKGROUND ── */
  #space-bg{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 80% 60% at 60% 40%, rgba(60,20,120,.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 70%, rgba(0,80,180,.35) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,160,120,.2) 0%, transparent 60%),
      #06040f;
  }
  #stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

  .grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain-shift .1s steps(1) infinite;mix-blend-mode:overlay;}
  @keyframes grain-shift{0%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0,0)}}
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:199;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,var(--scanline-opacity)) 2px,rgba(0,0,0,var(--scanline-opacity)) 4px);}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:198;background:radial-gradient(ellipse at center,transparent 35%,rgba(3,2,8,var(--vignette-strength)) 100%);}
  .chroma{position:relative;display:inline-block;}
  .chroma::before,.chroma::after{content:attr(data-text);position:absolute;inset:0;pointer-events:none;}
  .chroma::before{color:rgba(232,0,61,.4);transform:translateX(calc(-1 * var(--aberration)));mix-blend-mode:screen;}
  .chroma::after{color:rgba(45,91,255,.4);transform:translateX(var(--aberration));mix-blend-mode:screen;}
  .planet-glow{filter:blur(55px);background:radial-gradient(circle,var(--jestr-purple) 0%,var(--jestr-blue) 60%,var(--jestr-green) 100%);animation:pulse 9s infinite alternate;opacity:.7;}
  @keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.08);opacity:.8}}
  .depth-far{filter:blur(3px) saturate(.5) brightness(.7);}.depth-mid{filter:blur(.6px) saturate(.9);}.depth-near{filter:none;}
  .container-texture{position:relative;}
  .container-texture::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.04;border-radius:inherit;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");}
  @keyframes vhs-flicker{0%,96%,100%{opacity:1}97%{opacity:.9}98%{opacity:1}99%{opacity:.94}}
  .vhs-flicker{animation:vhs-flicker 6s infinite;}
  .tape-counter{font-variant-numeric:tabular-nums;letter-spacing:.15em;font-size:9px;color:rgba(0,200,150,.55);font-weight:700;text-transform:uppercase;}
  .no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
  .track-item.active{background:rgba(45,91,255,.1)!important;border-color:rgba(123,47,255,.3)!important;}
  .track-item.active .track-title{color:#e9e1de!important;}
  .track-item.active .track-artist{color:var(--jestr-green)!important;}
  .ring-far{animation:ring-expand 12s linear infinite;}.ring-near{animation:ring-expand 9s linear infinite 1.5s;}
  @keyframes ring-expand{0%{transform:scale(.4);opacity:.6}80%{opacity:.1}100%{transform:scale(1.6);opacity:0}}
  #mobile-drawer{transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
  #mobile-drawer.open{transform:translateX(0);}
  #drawer-overlay{opacity:0;pointer-events:none;transition:opacity .3s;}
  #drawer-overlay.open{opacity:1;pointer-events:all;}
  .ctrl-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;transition:color .2s,transform .1s;}
  .ctrl-btn:hover{transform:scale(1.12);}.ctrl-btn:active{transform:scale(.95);}
  .play-btn{background:linear-gradient(135deg,var(--jestr-purple),var(--jestr-blue));box-shadow:0 0 22px rgba(123,47,255,.5);transition:box-shadow .2s,transform .1s;border:none;cursor:pointer;}
  .play-btn:hover{box-shadow:0 0 32px rgba(45,91,255,.7);}

  /* ─ PROGRESS ─ */
  .progress-wrap{position:relative;height:18px;display:flex;align-items:center;cursor:pointer;flex:1;}
  .progress-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.08);transition:height .12s;}
  .progress-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:linear-gradient(90deg,var(--jestr-purple),var(--jestr-blue),var(--jestr-green));pointer-events:none;transition:height .12s;}
  .progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(123,47,255,.5),0 2px 8px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .15s,transform .1s;z-index:2;}
  .progress-wrap:hover .progress-thumb{opacity:1;}
  .progress-wrap:hover .progress-track-bg,.progress-wrap:hover .progress-fill-bar{height:4px;}
  .progress-wrap.dragging .progress-thumb{opacity:1;transform:translate(-50%,-50%) scale(1.2);}

  /* ─ VOLUME ─ */
  .volume-wrap{position:relative;height:14px;display:flex;align-items:center;cursor:pointer;width:60px;}
  .volume-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.08);}
  .volume-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:var(--jestr-green);pointer-events:none;}
  .volume-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 0 2px rgba(0,200,150,.4);pointer-events:none;opacity:0;transition:opacity .15s;}
  .volume-wrap:hover .volume-thumb{opacity:1;}

  /* ─ SEARCH ─ */
  .search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(123,47,255,.2);border-radius:10px;padding:0 10px;height:36px;transition:border-color .2s,box-shadow .2s;}
  .search-wrap:focus-within{border-color:rgba(123,47,255,.55);box-shadow:0 0 0 3px rgba(123,47,255,.08);}
  .search-wrap .material-symbols-outlined{font-size:16px;color:rgba(110,104,117,.6);flex-shrink:0;}
  .search-wrap input{background:transparent!important;border:none!important;outline:none!important;box-shadow:none!important;-webkit-appearance:none!important;appearance:none!important;color:#e9e1de;font-size:12px;font-family:inherit;width:100%;letter-spacing:.02em;padding:0;}
  .search-wrap input::placeholder{color:rgba(110,104,117,.45);}
  .search-wrap input:focus{outline:none!important;box-shadow:none!important;}

  /* ── FLOATING PLAYER — glassy ── */
  #float-player{
    position:fixed;z-index:300;
    bottom:20px;left:50%;transform:translateX(-50%);
    width:420px;
    min-width:300px;max-width:680px;
    min-height:140px;
    background:rgba(12,8,28,.55);
    backdrop-filter:blur(36px) saturate(1.6) brightness(1.1);
    -webkit-backdrop-filter:blur(36px) saturate(1.6) brightness(1.1);
    border:1px solid rgba(150,100,255,.28);
    border-radius:20px;
    box-shadow:
      0 8px 48px rgba(0,0,0,.6),
      0 0 0 1px rgba(45,91,255,.08),
      inset 0 1px 0 rgba(255,255,255,.07);
    padding:10px 14px;
    user-select:none;
    overflow:visible;
  }
  #float-player.is-positioned{transform:none;}

  /* drag handle */
  #fp-handle{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:8px;cursor:grab;padding-bottom:6px;
    border-bottom:1px solid rgba(150,100,255,.1);
  }
  #fp-handle:active{cursor:grabbing;}

  /* ── corner resize: small rounded dot, no diagonal lines ── */
  .fp-resize{
    position:absolute;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;
    z-index:10;
  }
  .fp-resize::after{
    content:"";
    width:6px;height:6px;
    border-radius:50%;
    background:rgba(123,47,255,.3);
    box-shadow:0 0 4px rgba(123,47,255,.2);
    transition:background .2s,box-shadow .2s,transform .15s;
    display:block;
  }
  .fp-resize:hover::after{
    background:rgba(123,47,255,.9);
    box-shadow:0 0 8px rgba(123,47,255,.6);
    transform:scale(1.4);
  }
  .fp-resize.nw{top:4px;left:4px;cursor:nw-resize;}
  .fp-resize.ne{top:4px;right:4px;cursor:ne-resize;}
  .fp-resize.sw{bottom:4px;left:4px;cursor:sw-resize;}
  .fp-resize.se{bottom:4px;right:4px;cursor:se-resize;}

  #fp-info{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  #fp-art{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(123,47,255,.2);border:1px solid rgba(123,47,255,.3);box-shadow:0 0 14px rgba(123,47,255,.2);}
  #fp-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  #fp-progress{display:flex;align-items:center;gap:7px;}
</style>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{
    colors:{"surface":"#06040f","surface-container-low":"#0e0c1a","surface-container":"#131120","surface-container-high":"#1c1930","on-surface":"#e9e1de","outline":"#6e6875","background":"#06040f"},
    fontFamily:{headline:["Plus Jakarta Sans"],body:["Plus Jakarta Sans"]},
    borderRadius:{DEFAULT:"0.75rem",lg:"1.5rem",xl:"2.5rem",full:"9999px"},
  }}}
</script>
</head>
<body>
<div id="space-bg"></div>
<canvas id="stars-canvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain-overlay"></div>
<audio id="audio-player" preload="auto"></audio>

<!-- ══ SIDEBAR ════════════════════════════════════════ -->
<aside class="hidden md:flex h-full w-64 fixed left-0 top-0 z-40 flex-col border-r container-texture depth-near"
  style="background:rgba(8,5,20,.85);backdrop-filter:blur(20px);border-color:rgba(100,60,200,.12);padding:24px 20px;gap:16px">
  <div style="margin-bottom:4px">
    <h1 class="text-2xl font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple);line-height:1">Orbit</h1>
    <p class="font-bold tracking-[0.3em] text-[8px] uppercase" style="color:rgba(0,200,150,.5);margin-top:2px">Cosmic Hi-Fi</p>
  </div>
  <button class="flex items-center gap-3 px-3 py-2 rounded-lg w-full text-left" style="background:rgba(123,47,255,.12);color:rgba(200,180,255,.9);font-weight:700;font-size:12px">
    <span class="material-symbols-outlined" style="font-size:18px">library_music</span>Tracks
  </button>
  <div style="height:1px;background:rgba(100,60,200,.12)"></div>
  <div class="search-wrap">
    <span class="material-symbols-outlined">search</span>
    <input id="search-input" placeholder="Search tracks…" type="text" autocomplete="off"/>
  </div>
  <div class="flex items-center justify-between" style="padding:0 2px">
    <span class="tape-counter">Tracklist</span>
    <span class="tape-counter" id="track-count">12 TRK</span>
  </div>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="sidebar-tracklist"></div>
</aside>

<div id="drawer-overlay" class="fixed inset-0 bg-black/70 z-40 md:hidden"></div>

<!-- ══ MOBILE DRAWER ═══════════════════════════════════════ -->
<aside id="mobile-drawer" class="fixed left-0 top-0 h-full w-64 z-50 flex flex-col p-5 gap-4 md:hidden container-texture" style="background:rgba(8,5,20,.92);backdrop-filter:blur(20px)">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple)">Orbit</h1>
      <p class="text-[8px] font-bold tracking-[0.3em] uppercase" style="color:rgba(0,200,150,.5)">Cosmic Hi-Fi</p>
    </div>
    <button id="close-drawer" style="color:#6e6875"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div style="height:1px;background:rgba(100,60,200,.12)"></div>
  <span class="tape-counter" style="padding:0 4px">Tracklist</span>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="mobile-tracklist"></div>
</aside>

<!-- ══ MOBILE TOP BAR ══════════════════════════════════════ -->
<header class="md:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-5 py-3.5 border-b depth-near"
  style="background:rgba(8,5,20,.8);backdrop-filter:blur(20px);border-color:rgba(100,60,200,.1)">
  <button id="open-drawer" style="color:#6e6875"><span class="material-symbols-outlined">menu</span></button>
  <h1 class="text-lg font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple)">Orbit</h1>
  <div class="w-7"></div>
</header>

<!-- ══ DESKTOP MAIN ═════════════════════════════════════════ -->
<main class="hidden md:flex h-screen items-center justify-center overflow-hidden relative" style="margin-left:16rem;padding:40px">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none depth-far">
    <div class="absolute w-[640px] h-[640px] rounded-full ring-far" style="border:1px solid rgba(45,91,255,.07)"></div>
    <div class="absolute w-[420px] h-[420px] rounded-full ring-near" style="border:1px solid rgba(123,47,255,.09)"></div>
  </div>
  <div class="relative flex items-center justify-center" style="flex:1">
    <div class="relative w-[360px] h-[360px] depth-mid">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden shadow-2xl" style="background:rgba(15,10,35,.35);backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(123,47,255,.15)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 0);background-size:12px 12px;opacity:.2"></div>
        <div class="absolute inset-0" style="background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.008) 18px,rgba(255,255,255,.008) 19px)"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 z-10 depth-near">
        <p class="tape-counter" style="margin-bottom:12px">NOW PLAYING</p>
        <h2 id="focal-title" data-text="—" class="chroma font-black italic tracking-tighter leading-none uppercase" style="font-size:2.8rem;color:#e9e1de;text-shadow:0 0 40px rgba(123,47,255,.5);margin-bottom:12px">—</h2>
        <p id="focal-artist" class="font-bold tracking-[0.5em] uppercase" style="font-size:10px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div class="flex flex-col z-20 depth-near" style="width:240px;gap:16px">
    <div class="flex items-center justify-between" style="padding-bottom:12px;border-bottom:1px solid rgba(100,60,200,.12)">
      <span class="tape-counter">Up Next</span>
      <span class="material-symbols-outlined" style="font-size:14px;color:var(--jestr-blue)">auto_awesome</span>
    </div>
    <div id="upnext-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</main>

<!-- ══ MOBILE MAIN ═══════════════════════════════════════════ -->
<main class="md:hidden flex flex-col h-screen pt-14 pb-36 overflow-y-auto no-scrollbar">
  <div class="flex flex-col items-center py-8 relative">
    <div class="absolute w-56 h-56 rounded-full ring-far depth-far" style="border:1px solid rgba(45,91,255,.07)"></div>
    <div class="relative w-44 h-44 depth-mid">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden" style="background:rgba(15,10,35,.3);backdrop-filter:blur(16px);border:1px solid rgba(123,47,255,.12)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 0);background-size:10px 10px;opacity:.15"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 z-10 depth-near">
        <p class="tape-counter" style="font-size:7px;margin-bottom:4px">NOW PLAYING</p>
        <h2 id="focal-title-mobile" data-text="—" class="chroma text-xl font-black italic tracking-tighter leading-none uppercase" style="color:#e9e1de;margin-bottom:4px">—</h2>
        <p id="focal-artist-mobile" class="font-bold tracking-widest uppercase" style="font-size:8px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div style="padding:0 20px 16px">
    <span class="tape-counter" style="display:block;margin-bottom:12px">All Tracks</span>
    <div style="display:flex;flex-direction:column;gap:4px" id="mobile-main-tracklist"></div>
  </div>
</main>

<!-- ══ FLOATING PLAYER WIDGET ════════════════════════════════ -->
<div id="float-player" class="container-texture">
  <!-- corner resize dot handles -->
  <div class="fp-resize nw" data-dir="nw"></div>
  <div class="fp-resize ne" data-dir="ne"></div>
  <div class="fp-resize sw" data-dir="sw"></div>
  <div class="fp-resize se" data-dir="se"></div>

  <!-- drag handle -->
  <div id="fp-handle">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="material-symbols-outlined" style="font-size:13px;color:rgba(150,100,255,.5)">drag_indicator</span>
      <span class="tape-counter" style="font-size:8px">Orbit Player</span>
    </div>
    <button id="btn-download" class="ctrl-btn" style="color:#6e6875" title="Download">
      <span class="material-symbols-outlined" style="font-size:15px">download</span>
    </button>
  </div>

  <!-- track info + volume -->
  <div id="fp-info">
    <div id="fp-art">
      <span class="material-symbols-outlined" style="font-size:18px;color:var(--jestr-purple);font-variation-settings:'FILL' 1">music_note</span>
    </div>
    <div style="flex:1;min-width:0">
      <p id="fp-title" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#e9e1de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">No Track</p>
      <p id="fp-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--jestr-green);margin:0">&mdash;</p>
    </div>
    <span class="material-symbols-outlined" style="font-size:14px;color:#6e6875;flex-shrink:0">volume_up</span>
    <div class="volume-wrap" id="volume-rail">
      <div class="volume-track-bg"></div>
      <div class="volume-fill-bar" id="volume-fill" style="width:80%"></div>
      <div class="volume-thumb" id="volume-thumb"></div>
    </div>
  </div>

  <!-- controls: shuffle | prev | -10 | play | +10 | next | repeat -->
  <div id="fp-controls">
    <button id="btn-shuffle" class="ctrl-btn" style="color:#6e6875" title="Shuffle">
      <span class="material-symbols-outlined" style="font-size:17px">shuffle</span>
    </button>
    <button id="btn-prev" class="ctrl-btn" style="color:var(--jestr-blue)" title="Prev">
      <span class="material-symbols-outlined" style="font-size:20px">skip_previous</span>
    </button>
    <button id="btn-back10" class="ctrl-btn" style="color:#a09aad" title="-10s">
      <span class="material-symbols-outlined" style="font-size:18px">replay_10</span>
    </button>
    <button id="btn-play" class="play-btn" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span id="play-icon" class="material-symbols-outlined text-white" style="font-size:22px;font-variation-settings:'FILL' 1">play_arrow</span>
    </button>
    <button id="btn-fwd10" class="ctrl-btn" style="color:#a09aad" title="+10s">
      <span class="material-symbols-outlined" style="font-size:18px">forward_10</span>
    </button>
    <button id="btn-next" class="ctrl-btn" style="color:var(--jestr-blue)" title="Next">
      <span class="material-symbols-outlined" style="font-size:20px">skip_next</span>
    </button>
    <button id="btn-repeat" class="ctrl-btn" style="color:#6e6875" title="Repeat">
      <span id="repeat-icon" class="material-symbols-outlined" style="font-size:17px">repeat</span>
    </button>
  </div>

  <!-- progress -->
  <div id="fp-progress">
    <span id="time-current" class="tape-counter" style="width:28px;flex-shrink:0">0:00</span>
    <div class="progress-wrap" id="progress-rail">
      <div class="progress-track-bg"></div>
      <div class="progress-fill-bar" id="progress-fill" style="width:0%"></div>
      <div class="progress-thumb" id="progress-thumb"></div>
    </div>
    <span id="time-total" class="tape-counter" style="width:28px;flex-shrink:0;text-align:right">0:00</span>
  </div>
</div>

<script>
  /* ── STARFIELD CANVAS ── */
  (function(){
    const c=document.getElementById("stars-canvas");
    const ctx=c.getContext("2d");
    let W,H,stars=[];
    function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    function mkStars(){
      stars=[];
      const n=Math.floor((W*H)/3000);
      for(let i=0;i<n;i++){
        stars.push({
          x:Math.random()*W, y:Math.random()*H,
          r:Math.random()*1.2+.2,
          a:Math.random(),
          da:(Math.random()-.5)*.004,
          speed:Math.random()*.04+.005
        });
      }
    }
    function draw(){
      ctx.clearRect(0,0,W,H);
      for(const s of stars){
        s.a+=s.da;
        if(s.a<=0||s.a>=1)s.da*=-1;
        s.y+=s.speed;
        if(s.y>H){s.y=0;s.x=Math.random()*W;}
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(220,210,255,${Math.max(0,Math.min(1,s.a))})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    resize();mkStars();draw();
    window.addEventListener("resize",()=>{resize();mkStars();});
  })();

  const TRACKS = [
    {title:"Geronimo",                  artist:"jestR",file:"11 - Geronimo- jestR - 2020.mp3"},
    {title:"Mile High",                 artist:"jestR",file:"3 - Mile High- jestR - 2020.mp3"},
    {title:"Follow The Flow",           artist:"jestR",file:"Mp3-FollowTheFlow.mp3"},
    {title:"Soul Seer",                 artist:"jestR",file:"Mp3-SoulSeer.mp3"},
    {title:"Peace",                     artist:"jestR",file:"Peace.mp3"},
    {title:"Strider",                   artist:"jestR",file:"Strider.mp3"},
    {title:"Insane Membrane",           artist:"jestR",file:"Insane_membrane.mp3"},
    {title:"News",                      artist:"jestR",file:"Newsss.mp3"},
    {title:"Wheels",                    artist:"jestR",file:"mp3Wheels-36.mp3"},
    {title:"Pop",                       artist:"jestR",file:"pop.mp3"},
    {title:"The Sum Of Hippy Thoughts", artist:"jestR",file:"the sum of hippy thoughts - Output - Stereo Out.mp3"},
    {title:"What Dreams May Come",      artist:"jestR",file:"what_dreams_may_comewavy.wav"},
  ];

  const audio = document.getElementById("audio-player");
  let currentIndex=0, isPlaying=false, isShuffle=false, repeatMode=0;
  let seekOnReady=null;

  /* ── DRAG + CORNER RESIZE ── */
  (function(){
    const fp = document.getElementById("float-player");
    const handle = document.getElementById("fp-handle");
    let mode=null;
    let startX,startY,startL,startT,startW,startH;

    function getRect(){ return fp.getBoundingClientRect(); }

    function pinPosition(){
      if(!fp.classList.contains("is-positioned")){
        const r=getRect();
        fp.style.transform="none";
        fp.style.bottom="";
        fp.style.left=r.left+"px";
        fp.style.top=r.top+"px";
        fp.style.width=r.width+"px";
        fp.style.height=r.height+"px";
        fp.classList.add("is-positioned");
      }
    }

    function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

    function onDown(e, m){
      pinPosition();
      const r=getRect();
      mode=m;
      const cx = e.touches?e.touches[0].clientX:e.clientX;
      const cy = e.touches?e.touches[0].clientY:e.clientY;
      startX=cx; startY=cy;
      startL=r.left; startT=r.top;
      startW=r.width; startH=r.height;
      e.preventDefault();
    }

    function onMove(e){
      if(!mode)return;
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const dx=cx-startX, dy=cy-startY;
      const mw=300, mh=140;
      const vw=window.innerWidth, vh=window.innerHeight;

      if(mode==='drag'){
        const nl=clamp(startL+dx,0,vw-startW);
        const nt=clamp(startT+dy,0,vh-startH);
        fp.style.left=nl+"px"; fp.style.top=nt+"px";
      } else {
        let l=startL,t=startT,w=startW,h=startH;
        if(mode==='se'){ w=clamp(startW+dx,mw,680); h=clamp(startH+dy,mh,600); }
        if(mode==='sw'){ const nw=clamp(startW-dx,mw,680); l=startL+startW-nw; w=nw; h=clamp(startH+dy,mh,600); }
        if(mode==='ne'){ w=clamp(startW+dx,mw,680); const nh=clamp(startH-dy,mh,600); t=startT+startH-nh; h=nh; }
        if(mode==='nw'){ const nw=clamp(startW-dx,mw,680); l=startL+startW-nw; w=nw; const nh=clamp(startH-dy,mh,600); t=startT+startH-nh; h=nh; }
        fp.style.left=l+"px"; fp.style.top=t+"px"; fp.style.width=w+"px"; fp.style.height=h+"px";
      }
    }
    function onUp(){ mode=null; }

    handle.addEventListener("mousedown",e=>onDown(e,'drag'));
    handle.addEventListener("touchstart",e=>onDown(e,'drag'),{passive:false});
    fp.querySelectorAll(".fp-resize").forEach(el=>{
      el.addEventListener("mousedown",e=>{ onDown(e,el.dataset.dir); });
      el.addEventListener("touchstart",e=>{ onDown(e,el.dataset.dir); },{passive:false});
    });
    window.addEventListener("mousemove",onMove);
    window.addEventListener("touchmove",e=>{ if(mode)onMove(e); },{passive:true});
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchend",onUp);
  })();

  /* ── HELPERS ── */
  function fmt(s){ if(!s||isNaN(s)||!isFinite(s))return"0:00"; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`; }
  function updateChroma(id,text){ const el=document.getElementById(id);if(!el)return;el.textContent=text;el.setAttribute("data-text",text); }
  function downloadCurrent(){ const t=TRACKS[currentIndex];const a=document.createElement("a");a.href=t.file;a.download=t.file;a.click(); }

  /* ── SEEK ── */
  function applySavedSeek(){
    if(seekOnReady!==null && audio.readyState>=1 && isFinite(audio.duration) && audio.duration>0){
      audio.currentTime=seekOnReady*audio.duration;
      seekOnReady=null;
    }
  }
  audio.addEventListener("loadedmetadata", applySavedSeek);
  audio.addEventListener("canplay", applySavedSeek);

  function setProgress(pct){
    document.getElementById("progress-fill").style.width=pct+"%";
    document.getElementById("progress-thumb").style.left=pct+"%";
  }

  function seekToPct(pct){
    pct=Math.max(0,Math.min(1,pct));
    if(audio.readyState>=1&&isFinite(audio.duration)&&audio.duration>0){
      audio.currentTime=pct*audio.duration; seekOnReady=null;
    } else {
      seekOnReady=pct;
    }
    setProgress(pct*100);
  }

  function skip(sec){
    if(audio.readyState>=1&&isFinite(audio.duration)){
      audio.currentTime=Math.max(0,Math.min(audio.duration,(audio.currentTime||0)+sec));
    }
  }

  function seekFromEvent(e,rail){
    const r=rail.getBoundingClientRect();
    seekToPct((e.clientX-r.left)/r.width);
  }

  function makeScrubber(railId){
    const rail=document.getElementById(railId); let drag=false;
    rail.addEventListener("mousedown",e=>{ drag=true;rail.classList.add("dragging");seekFromEvent(e,rail);e.preventDefault(); });
    window.addEventListener("mousemove",e=>{ if(drag)seekFromEvent(e,rail); });
    window.addEventListener("mouseup",()=>{ if(drag){drag=false;rail.classList.remove("dragging");} });
    rail.addEventListener("touchstart",e=>{ drag=true;rail.classList.add("dragging");seekFromEvent(e.touches[0],rail);e.preventDefault(); },{passive:false});
    window.addEventListener("touchmove",e=>{ if(drag)seekFromEvent(e.touches[0],rail); },{passive:true});
    window.addEventListener("touchend",()=>{ drag=false;rail.classList.remove("dragging"); });
  }
  makeScrubber("progress-rail");

  /* ── LOAD TRACK ── */
  function loadTrack(index, autoplay=false){
    currentIndex=index; seekOnReady=null;
    const t=TRACKS[index];
    audio.src=t.file;
    audio.load();
    updateChroma("focal-title",t.title);
    updateChroma("focal-title-mobile",t.title);
    ["focal-artist","focal-artist-mobile"].forEach(id=>{ const el=document.getElementById(id);if(el)el.textContent=t.artist; });
    document.getElementById("fp-title").textContent=t.title;
    document.getElementById("fp-artist").textContent=t.artist;
    setProgress(0);
    document.getElementById("time-current").textContent="0:00";
    document.getElementById("time-total").textContent="0:00";
    renderAll();
    if(autoplay){ audio.play().then(()=>{ isPlaying=true;updatePlayIcons();renderAll(); }).catch(()=>{}); }
    else{ isPlaying=false; }
    updatePlayIcons();
  }

  /* ── VOLUME ── */
  function setVolume(pct){
    audio.volume=pct;
    document.getElementById("volume-fill").style.width=(pct*100)+"%";
    document.getElementById("volume-thumb").style.left=(pct*100)+"%";
  }
  (function(){
    const rail=document.getElementById("volume-rail");let drag=false;
    function v(e){const r=rail.getBoundingClientRect();setVolume(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
    rail.addEventListener("mousedown",e=>{drag=true;v(e);e.preventDefault();});
    window.addEventListener("mousemove",e=>{if(drag)v(e);});
    window.addEventListener("mouseup",()=>{drag=false;});
  })();

  /* ── TIMEUPDATE ── */
  audio.addEventListener("timeupdate",()=>{
    if(!audio.duration||!isFinite(audio.duration))return;
    setProgress((audio.currentTime/audio.duration)*100);
    document.getElementById("time-current").textContent=fmt(audio.currentTime);
    document.getElementById("time-total").textContent=fmt(audio.duration);
  });

  /* ── ENDED ── */
  audio.addEventListener("ended",()=>{
    if(repeatMode===2){audio.currentTime=0;audio.play();return;}
    if(repeatMode===1){loadTrack((currentIndex+1)%TRACKS.length,true);return;}
    if(currentIndex<TRACKS.length-1){ loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):currentIndex+1,true); }
    else{ isPlaying=false;updatePlayIcons();renderAll(); }
  });

  /* ── REPEAT / SHUFFLE UI ── */
  function updateRepeatUI(){
    const btn=document.getElementById("btn-repeat");
    const icon=document.getElementById("repeat-icon");
    if(repeatMode===0){btn.style.color="#6e6875";icon.textContent="repeat";btn.title="Repeat: Off";}
    else if(repeatMode===1){btn.style.color="var(--jestr-blue)";icon.textContent="repeat";btn.title="Repeat: All";}
    else{btn.style.color="var(--jestr-red)";icon.textContent="repeat_one";btn.title="Repeat: One";}
  }
  function updatePlayIcons(){
    document.getElementById("play-icon").textContent=isPlaying?"pause":"play_arrow";
  }

  /* ── RENDER TRACKS ── */
  function trackHTML(t,i,isActive){
    return `<div class="track-item" data-index="${i}"
      style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;
        border:1px solid ${isActive?'rgba(123,47,255,.3)':'transparent'};
        background:${isActive?'rgba(45,91,255,.1)':'transparent'};
        transition:background .15s,border-color .15s">
      <span style="font-size:9px;font-weight:700;color:#6e6875;width:16px;flex-shrink:0;text-align:right">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1;min-width:0">
        <p class="track-title" style="font-size:11px;font-weight:700;color:${isActive?'#e9e1de':'rgba(233,225,222,.45)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title}</p>
        <p class="track-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:${isActive?'var(--jestr-green)':'rgba(110,104,117,.45)'};margin:0">${t.artist}</p>
      </div>
      ${isActive&&isPlaying?'<span class="material-symbols-outlined" style="font-size:12px;color:var(--jestr-purple);flex-shrink:0">equalizer</span>':''}
    </div>`;
  }
  function renderAll(){
    const html=TRACKS.map((t,i)=>trackHTML(t,i,i===currentIndex)).join("");
    ["sidebar-tracklist","mobile-tracklist","mobile-main-tracklist"].forEach(id=>{
      const el=document.getElementById(id);if(!el)return;
      el.innerHTML=html;
      el.querySelectorAll(".track-item").forEach(item=>{
        item.addEventListener("mouseenter",()=>{if(parseInt(item.dataset.index)!==currentIndex)item.style.background="rgba(45,91,255,.06)";});
        item.addEventListener("mouseleave",()=>{if(parseInt(item.dataset.index)!==currentIndex)item.style.background="";});
        item.addEventListener("click",()=>{loadTrack(parseInt(item.dataset.index),true);closeDrawer();});
      });
    });
    const upnext=document.getElementById("upnext-list");
    if(upnext){
      upnext.innerHTML=[1,2,3].map(i=>{
        const idx=(currentIndex+i)%TRACKS.length;const t=TRACKS[idx];
        return `<div data-index="${idx}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(100,60,200,.1);transition:background .15s"
          onmouseenter="this.style.background='rgba(45,91,255,.07)'" onmouseleave="this.style.background=''">
          <span style="font-size:9px;font-weight:700;color:#6e6875;flex-shrink:0">${String(i).padStart(2,"0")}</span>
          <div style="flex:1;min-width:0">
            <p style="font-size:11px;font-weight:700;color:rgba(233,225,222,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title.toUpperCase()}</p>
            <p style="font-size:8px;font-weight:700;color:rgba(0,200,150,.4);letter-spacing:.14em;margin:0">${t.artist.toUpperCase()}</p>
          </div>
        </div>`;
      }).join("");
      upnext.querySelectorAll("[data-index]").forEach(el=>{el.addEventListener("click",()=>loadTrack(parseInt(el.dataset.index),true));});
    }
  }

  /* ── CONTROLS ── */
  function togglePlay(){
    if(!audio.src||audio.src===window.location.href){loadTrack(0,true);return;}
    if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}
    updatePlayIcons();renderAll();
  }
  function prevTrack(){if((audio.currentTime||0)>3){audio.currentTime=0;return;}loadTrack((currentIndex-1+TRACKS.length)%TRACKS.length,isPlaying);}
  function nextTrack(){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):(currentIndex+1)%TRACKS.length,isPlaying);}

  document.getElementById("btn-play").addEventListener("click",togglePlay);
  document.getElementById("btn-prev").addEventListener("click",prevTrack);
  document.getElementById("btn-next").addEventListener("click",nextTrack);
  document.getElementById("btn-back10").addEventListener("click",()=>skip(-10));
  document.getElementById("btn-fwd10").addEventListener("click",()=>skip(10));
  document.getElementById("btn-download").addEventListener("click",downloadCurrent);
  document.getElementById("btn-shuffle").addEventListener("click",()=>{
    isShuffle=!isShuffle;
    document.getElementById("btn-shuffle").style.color=isShuffle?"var(--jestr-blue)":"#6e6875";
  });
  document.getElementById("btn-repeat").addEventListener("click",()=>{repeatMode=(repeatMode+1)%3;updateRepeatUI();});

  /* ── SEARCH ── */
  document.getElementById("search-input").addEventListener("input",e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll(".track-item").forEach(el=>{
      const t=TRACKS[parseInt(el.dataset.index)];
      el.style.display=(t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q))?"":"none";
    });
  });

  /* ── DRAWER ── */
  document.getElementById("open-drawer").addEventListener("click",()=>{
    document.getElementById("mobile-drawer").classList.add("open");
    document.getElementById("drawer-overlay").classList.add("open");
  });
  document.getElementById("close-drawer").addEventListener("click",closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click",closeDrawer);
  function closeDrawer(){
    document.getElementById("mobile-drawer").classList.remove("open");
    document.getElementById("drawer-overlay").classList.remove("open");
  }

  setVolume(0.8);
  updateRepeatUI();
  loadTrack(0,false);
</script>
</body>
</html>
