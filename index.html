<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit Planetary Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #161311;
    margin: 0;
    overflow: hidden;
    color: #e9e1de;
  }
  .grain-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 99; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }
  .container-texture { position: relative; }
  .container-texture::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    border-radius: inherit;
  }
  .planet-glow {
    filter: blur(60px);
    background: radial-gradient(circle, #6200ea 0%, #008080 100%);
    animation: pulse 8s infinite alternate;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.1); opacity: 0.7; }
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  #progress-rail, #volume-rail { cursor: pointer; }
  .track-item.active { background: rgba(30,27,25,0.6) !important; border-color: rgba(255,255,255,0.1) !important; }
  .track-item.active .track-title { opacity: 1 !important; }
  .track-item.active .track-artist { opacity: 1 !important; color: #89CFF0 !important; }
  #mobile-drawer {
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  #mobile-drawer.open { transform: translateX(0); }
  #drawer-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #drawer-overlay.open { opacity: 1; pointer-events: all; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-dim": "#161311", "on-background": "#e9e1de",
          "on-surface": "#e9e1de", "surface-bright": "#3c3836",
          "surface": "#161311", "surface-variant": "#383432",
          "primary": "#cfbcff", "surface-container-highest": "#383432",
          "on-primary-container": "#cfbcff", "surface-container": "#221f1d",
          "inverse-surface": "#e9e1de", "tertiary-container": "#aa0100",
          "surface-container-high": "#2d2927", "secondary-container": "#007f7f",
          "outline-variant": "#494456", "primary-container": "#6200ea",
          "on-primary": "#3a0092", "on-secondary": "#003737",
          "background": "#161311", "surface-container-low": "#1e1b19",
          "secondary": "#76d6d5", "on-primary-fixed": "#22005d",
          "inverse-primary": "#6e25f6", "surface-container-lowest": "#100e0c",
          "on-secondary-container": "#ddfffe", "outline": "#958da2",
          "primary-fixed": "#e9ddff", "surface-tint": "#cfbcff",
          "accent-blue": "#89CFF0", "accent-red": "#FF0000"
        },
        fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Plus Jakarta Sans"] },
        borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
      },
    },
  }
</script>
</head>
<body class="bg-surface text-on-surface">
<div class="grain-overlay"></div>
<audio id="audio-player"></audio>

<!-- DESKTOP SIDEBAR -->
<aside id="desktop-sidebar" class="hidden md:flex h-full w-72 fixed left-0 top-0 z-40 bg-surface-container-low flex-col p-6 gap-6 shadow-[1px_0_0_0_rgba(255,255,255,0.05)] container-texture">
  <div class="flex flex-col gap-1 mb-2">
    <h1 class="text-3xl font-black tracking-tighter text-primary-container italic">Orbit</h1>
    <p class="font-bold tracking-widest text-[10px] uppercase text-outline opacity-60">Cosmic High-Fidelity</p>
  </div>
  <nav class="flex flex-col gap-2">
    <button class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary-container/10 text-primary font-bold">
      <span class="material-symbols-outlined">library_music</span><span>Tracks</span>
    </button>
  </nav>
  <div class="h-px bg-outline/10"></div>
  <div class="flex items-center px-2">
    <span class="text-[10px] font-bold uppercase tracking-widest text-outline">Tracklist</span>

<!-- MOBILE DRAWER -->

  <button id="open-drawer" class="text-outline hover:text-primary">

  </button>
  <h1 class="text-xl font-black tracking-tighter text-primary-container italic">Orbit</h1>

</header>

<!-- DESKTOP TOP BAR -->
<header class="hidden md:flex fixed top-0 right-0 w-[calc(100%-18rem)] z-30 justify-between items-center px-12 py-8 bg-transparent">

<!-- DESKTOP FOOTER -->
<footer class="hidden md:flex fixed bottom-0 left-0 w-full z-50 justify-center items-center pb-8 px-12">
  <div class="w-full max-w-7xl rounded-[2.5rem] px-10 py-5 bg-surface-container-high/80 backdrop-blur-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.5)] border border-white/5 flex justify-between items-center container-texture">
    <!-- Now playing -->
    <div class="flex items-center gap-5 w-72">
      <div class="w-14 h-14 rounded-2xl bg-surface-container-highest flex items-center justify-center shadow-lg border border-white/5">
        <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings:'FILL' 1;">music_note</span>
      </div>
      <div>
        <p id="footer-title" class="text-sm font-black text-on-surface uppercase tracking-tight">No Track</p>

    <div class="flex flex-col items-center gap-3 flex-1 max-w-xl">

        <button id="btn-prev" class="text-accent-blue hover:text-primary transition-all"><span class="material-symbols-outlined text-2xl">skip_previous</span></button>
        <button id="btn-play" class="w-14 h-14 rounded-full bg-gradient-to-br from-primary-container to-secondary-container text-white flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-xl">

      <span class="material-symbols-outlined text-outline text-lg">volume_up</span>

      </div>
      <button id="btn-download" title="Download current track" class="text-outline hover:text-accent-blue transition-all hover:scale-110">

  </div>

<!-- MOBILE FOOTER -->
<footer class="md:hidden fixed bottom-0 left-0 right-0 z-50 px-4 pb-6 pt-2">
  <div class="rounded-3xl px-5 py-4 bg-surface-container-high/90 backdrop-blur-3xl shadow-[0_16px_48px_-8px_rgba(0,0,0,0.6)] border border-white/5 container-texture">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-11 h-11 rounded-xl bg-surface-container-highest flex items-center justify-center border border-white/5 flex-shrink-0">
        <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:'FILL' 1;">music_note</span>
      </div>
      <div class="flex-1 min-w-0">
        <p id="mob-footer-title" class="text-xs font-black text-on-surface uppercase tracking-tight truncate">No Track</p>
        <p id="mob-footer-artist" class="text-[9px] text-accent-blue font-bold uppercase tracking-widest truncate">—</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="mob-btn-download" title="Download" class="text-outline hover:text-accent-blue transition-all">
          <span class="material-symbols-outlined text-xl">download</span>
        </button>
        <button id="mob-btn-prev" class="text-accent-blue"><span class="material-symbols-outlined text-xl">skip_previous</span></button>
        <button id="mob-btn-play" class="w-11 h-11 rounded-full bg-gradient-to-br from-primary-container to-secondary-container text-white flex items-center justify-center active:scale-95 transition-all shadow-lg">
          <span id="mob-play-icon" class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1;">play_arrow</span>
        </button>
        <button id="mob-btn-next" class="text-accent-blue"><span class="material-symbols-outlined text-xl">skip_next</span></button>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="mob-time-current" class="text-[9px] font-bold text-outline/60 tabular-nums w-7">0:00</span>
      <div id="mob-progress-rail" class="flex-1 h-1 bg-surface-container rounded-full overflow-hidden relative cursor-pointer">
        <div id="mob-progress-fill" class="absolute left-0 top-0 h-full w-0 bg-gradient-to-r from-primary to-secondary rounded-full"></div>
      </div>
      <span id="mob-time-total" class="text-[9px] font-bold text-outline/60 tabular-nums w-7 text-right">0:00</span>
    </div>
  </div>
</footer>

<script>
  const TRACKS = [
    { title: "Geronimo",       artist: "jestR", file: "11 - Geronimo- jestR - 2020.mp3" },
    { title: "Follow The Flow", artist: "jestR", file: "Mp3-FollowTheFlow.mp3" },
    { title: "Soul Seer",      artist: "jestR", file: "Mp3-SoulSeer.mp3" },
    { title: "Peace",          artist: "jestR", file: "Peace.mp3" },
  ];

  const audio = document.getElementById("audio-player");
  let currentIndex = 0;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat = false;

  function fmt(s) {
    if (isNaN(s) || !isFinite(s)) return "0:00";
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, "0")}`;
  }

  function downloadCurrent() {
    const t = TRACKS[currentIndex];
    const a = document.createElement("a");
    a.href = encodeURIComponent(t.file);
    a.download = t.file;
    a.click();
  }

  function loadTrack(index, autoplay = false) {
    currentIndex = index;
    const t = TRACKS[index];
    audio.src = encodeURIComponent(t.file);
    document.getElementById("focal-title").textContent = t.title;
    document.getElementById("focal-artist").textContent = t.artist;
    document.getElementById("focal-title-mobile").textContent = t.title;
    document.getElementById("focal-artist-mobile").textContent = t.artist;
    document.getElementById("footer-title").textContent = t.title;
    document.getElementById("footer-artist").textContent = t.artist;
    document.getElementById("mob-footer-title").textContent = t.title;
    document.getElementById("mob-footer-artist").textContent = t.artist;
    ["progress-fill","mob-progress-fill"].forEach(id => document.getElementById(id).style.width = "0%");
    ["time-current","mob-time-current","time-total","mob-time-total"].forEach(id => document.getElementById(id).textContent = "0:00");
    renderAll();
    if (autoplay) { audio.play(); isPlaying = true; }
    else { isPlaying = false; }
    updatePlayIcons();
  }

  function updatePlayIcons() {
    const icon = isPlaying ? "pause" : "play_arrow";
    document.getElementById("play-icon").textContent = icon;
    document.getElementById("mob-play-icon").textContent = icon;
  }

  function trackHTML(t, i, isActive) {
    return `<div class="track-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-surface-container-high transition-all border border-transparent ${isActive ? 'active' : ''}" data-index="${i}">
      <span class="text-[9px] font-bold text-outline w-4">${String(i+1).padStart(2,"0")}</span>
      <div class="flex-1 min-w-0">
        <p class="track-title text-xs font-bold truncate ${isActive ? '' : 'opacity-60'}">${t.title}</p>
        <p class="track-artist text-[9px] uppercase font-bold truncate ${isActive ? 'text-accent-blue' : 'text-outline opacity-40'}">${t.artist}</p>
      </div>
      ${isActive && isPlaying ? '<span class="material-symbols-outlined text-primary" style="font-size:14px">equalizer</span>' : ''}
    </div>`;
  }

  function renderAll() {
    const html = TRACKS.map((t, i) => trackHTML(t, i, i === currentIndex)).join("");
    ["sidebar-tracklist","mobile-tracklist","mobile-main-tracklist"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = html;
      el.querySelectorAll(".track-item").forEach(el => {
        el.addEventListener("click", () => {
          loadTrack(parseInt(el.dataset.index), true);
          closeDrawer();
        });
      });
    });
    const upnext = document.getElementById("upnext-list");
    if (upnext) {
      upnext.innerHTML = [1,2,3].map(i => {
        const idx = (currentIndex + i) % TRACKS.length;
        const t = TRACKS[idx];
        return `<div class="flex items-center gap-4 p-4 rounded-2xl hover:bg-surface-container-high/40 transition-all cursor-pointer" data-index="${idx}">
          <span class="text-[10px] font-bold text-outline">${String(i).padStart(2,"0")}</span>
          <div class="flex-1">
            <p class="text-sm font-bold text-on-surface opacity-60">${t.title.toUpperCase()}</p>
            <p class="text-[10px] text-outline uppercase font-bold opacity-40">${t.artist.toUpperCase()}</p>
          </div>
        </div>`;
      }).join("");
      upnext.querySelectorAll("[data-index]").forEach(el => {
        el.addEventListener("click", () => loadTrack(parseInt(el.dataset.index), true));
      });
    }
  }

  document.getElementById("btn-play").addEventListener("click", togglePlay);
  document.getElementById("btn-prev").addEventListener("click", prevTrack);
  document.getElementById("btn-next").addEventListener("click", nextTrack);
  document.getElementById("btn-download").addEventListener("click", downloadCurrent);
  document.getElementById("mob-btn-play").addEventListener("click", togglePlay);
  document.getElementById("mob-btn-prev").addEventListener("click", prevTrack);
  document.getElementById("mob-btn-next").addEventListener("click", nextTrack);
  document.getElementById("mob-btn-download").addEventListener("click", downloadCurrent);

  document.getElementById("btn-shuffle").addEventListener("click", () => {
    isShuffle = !isShuffle;
    document.getElementById("btn-shuffle").classList.toggle("text-accent-blue", isShuffle);
    document.getElementById("btn-shuffle").classList.toggle("text-outline", !isShuffle);
  });
  document.getElementById("btn-repeat").addEventListener("click", () => {
    isRepeat = !isRepeat;
    document.getElementById("btn-repeat").classList.toggle("text-accent-blue", isRepeat);
    document.getElementById("btn-repeat").classList.toggle("text-outline", !isRepeat);
  });

  function togglePlay() {
    if (!audio.src || audio.src === window.location.href) { loadTrack(0, true); return; }
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else { audio.play(); isPlaying = true; }
    updatePlayIcons(); renderAll();
  }
  function prevTrack() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    loadTrack((currentIndex - 1 + TRACKS.length) % TRACKS.length, isPlaying);
  }
  function nextTrack() {
    const next = isShuffle ? Math.floor(Math.random() * TRACKS.length) : (currentIndex + 1) % TRACKS.length;
    loadTrack(next, isPlaying);
  }

  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("mob-progress-fill").style.width = pct + "%";
    const cur = fmt(audio.currentTime), tot = fmt(audio.duration);
    document.getElementById("time-current").textContent = cur;
    document.getElementById("mob-time-current").textContent = cur;
    document.getElementById("time-total").textContent = tot;
    document.getElementById("mob-time-total").textContent = tot;
  });

  document.getElementById("progress-rail").addEventListener("click", (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });
  document.getElementById("mob-progress-rail").addEventListener("click", (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });
  document.getElementById("volume-rail").addEventListener("click", (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const vol = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    audio.volume = vol;
    document.getElementById("volume-fill").style.width = (vol * 100) + "%";
  });

  audio.addEventListener("ended", () => {
    if (isRepeat) { audio.play(); return; }
    nextTrack();
  });

  document.getElementById("search-input").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".track-item").forEach(el => {
      const t = TRACKS[parseInt(el.dataset.index)];
      el.style.display = (t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q)) ? "" : "none";
    });
  });

  document.getElementById("open-drawer").addEventListener("click", () => {
    document.getElementById("mobile-drawer").classList.add("open");
    document.getElementById("drawer-overlay").classList.add("open");
  });
  document.getElementById("close-drawer").addEventListener("click", closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
  function closeDrawer() {
    document.getElementById("mobile-drawer").classList.remove("open");
    document.getElementById("drawer-overlay").classList.remove("open");
  }

  loadTrack(0, false);
</script>
</body>
</html>
