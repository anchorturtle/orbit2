<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit Planetary Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --grain-opacity: 0.09;
    --scanline-opacity: 0.04;
    --vignette-strength: 0.65;
    --aberration: 1.5px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #12100e;
    margin: 0;
    overflow: hidden;
    color: #e9e1de;
  }

  /* ── FILM GRAIN ─────────────────────────────────────── */
  .grain-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 200; opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grain-shift 0.08s steps(1) infinite;
    mix-blend-mode: overlay;
  }
  @keyframes grain-shift {
    0%   { transform: translate(0, 0); }
    20%  { transform: translate(-2px, 1px); }
    40%  { transform: translate(2px, -1px); }
    60%  { transform: translate(-1px, 2px); }
    80%  { transform: translate(1px, -2px); }
    100% { transform: translate(0, 0); }
  }

  /* ── SCANLINES ───────────────────────────────────────── */
  .scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 199;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,var(--scanline-opacity)) 2px,
      rgba(0,0,0,var(--scanline-opacity)) 4px
    );
  }

  /* ── VIGNETTE ────────────────────────────────────────── */
  .vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 198;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(8, 6, 4, var(--vignette-strength)) 100%
    );
  }

  /* ── CHROMATIC ABERRATION on focal title ─────────────── */
  .chroma {
    position: relative;
    display: inline-block;
  }
  .chroma::before,
  .chroma::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .chroma::before {
    color: rgba(255, 50, 50, 0.35);
    transform: translateX(calc(-1 * var(--aberration)));
    mix-blend-mode: screen;
  }
  .chroma::after {
    color: rgba(50, 200, 255, 0.35);
    transform: translateX(var(--aberration));
    mix-blend-mode: screen;
  }

  /* ── PLANET GLOW ─────────────────────────────────────── */
  .planet-glow {
    filter: blur(55px);
    background: radial-gradient(circle, #5500cc 0%, #006666 100%);
    animation: pulse 9s infinite alternate;
    opacity: 0.7;
  }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.55; }
    100% { transform: scale(1.08); opacity: 0.75; }
  }

  /* ── DEPTH LAYERS ────────────────────────────────────── */
  /* Far background — heavily blurred, desaturated */
  .depth-far {
    filter: blur(3px) saturate(0.5) brightness(0.7);
    transition: filter 0.4s ease;
  }
  /* Mid — slight blur */
  .depth-mid {
    filter: blur(0.6px) saturate(0.85);
  }
  /* Near / in-focus — sharp, vivid */
  .depth-near {
    filter: none;
  }

  /* ── ANALOG WARMTH tint ──────────────────────────────── */
  body::before {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at 30% 60%, rgba(80,30,0,0.08) 0%, transparent 70%);
  }

  /* ── CONTAINER TEXTURE ───────────────────────────────── */
  .container-texture { position: relative; }
  .container-texture::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");
    border-radius: inherit;
  }

  /* ── VHS HEADER FLICKER (subtle) ─────────────────────── */
  @keyframes vhs-flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.92; }
    98% { opacity: 1; }
    99% { opacity: 0.95; }
  }
  .vhs-flicker { animation: vhs-flicker 6s infinite; }

  /* ── TAPE COUNTER (aesthetic detail) ─────────────────── */
  .tape-counter {
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.15em;
    font-size: 9px;
    color: rgba(137, 207, 240, 0.5);
    font-weight: 700;
    text-transform: uppercase;
  }

  /* ── MISC ────────────────────────────────────────────── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  #progress-rail, #mob-progress-rail, #volume-rail { cursor: pointer; }
  .track-item.active { background: rgba(25,22,18,0.7) !important; border-color: rgba(207,188,255,0.15) !important; }
  .track-item.active .track-title { opacity: 1 !important; }
  .track-item.active .track-artist { opacity: 1 !important; color: #89CFF0 !important; }

  /* ── PROGRESS BAR with analog tape look ──────────────── */
  .progress-track {
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 6px
    ), rgba(34,31,29,1);
  }

  /* ── MOBILE DRAWER ───────────────────────────────────── */
  #mobile-drawer {
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  #mobile-drawer.open { transform: translateX(0); }
  #drawer-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #drawer-overlay.open { opacity: 1; pointer-events: all; }

  /* ── RIPPLE RINGS custom ─────────────────────────────── */
  .ring-far  { animation: ring-expand 12s linear infinite; }
  .ring-near { animation: ring-expand 9s linear infinite 1.5s; }
  @keyframes ring-expand {
    0%   { transform: scale(0.4); opacity: 0.5; }
    80%  { opacity: 0.1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
</style>
<script id="tailwind-config">

          "surface": "#12100e",

          "outline-variant": "#3d3840",

          "on-primary": "#3a0092",
          "secondary": "#76d6d5",

          "accent-red": "#cc2200",

</script>
</head>

    <div class="flex items-center gap-2">
      <span id="mob-time-current" class="tape-counter w-7">0:00</span>
      <div id="mob-progress-rail" class="flex-1 h-1 rounded-full overflow-hidden relative progress-track">
        <div id="mob-progress-fill" class="absolute left-0 top-0 h-full w-0 rounded-full" style="background:linear-gradient(90deg,#cfbcff,#76d6d5)"></div>
      </div>
      <span id="mob-time-total" class="tape-counter w-7 text-right">0:00</span>
    </div>
  </div>
</footer>

<script>
  const TRACKS = [
    { title: "Geronimo",        artist: "jestR", file: "11 - Geronimo- jestR - 2020.mp3" },
    { title: "Follow The Flow", artist: "jestR", file: "Mp3-FollowTheFlow.mp3" },
    { title: "Soul Seer",       artist: "jestR", file: "Mp3-SoulSeer.mp3" },
    { title: "Peace",           artist: "jestR", file: "Peace.mp3" },
  ];

  const audio = document.getElementById("audio-player");
  let currentIndex = 0, isPlaying = false, isShuffle = false, isRepeat = false;

  function fmt(s) {
    if (isNaN(s) || !isFinite(s)) return "0:00";
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  }

  function updateChroma(elId, text) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = text;
    el.setAttribute("data-text", text);
  }

  function downloadCurrent() {
    const t = TRACKS[currentIndex];
    const a = document.createElement("a");
    a.href = encodeURIComponent(t.file);
    a.download = t.file;
    a.click();
  }

  function loadTrack(index, autoplay = false) {
    currentIndex = index;
    const t = TRACKS[index];
    audio.src = encodeURIComponent(t.file);
    updateChroma("focal-title", t.title);
    updateChroma("focal-title-mobile", t.title);
    document.getElementById("focal-artist").textContent = t.artist;
    document.getElementById("focal-artist-mobile").textContent = t.artist;
    document.getElementById("footer-title").textContent = t.title;
    document.getElementById("footer-artist").textContent = t.artist;
    document.getElementById("mob-footer-title").textContent = t.title;
    document.getElementById("mob-footer-artist").textContent = t.artist;
    ["progress-fill","mob-progress-fill"].forEach(id => document.getElementById(id).style.width = "0%");
    ["time-current","mob-time-current","time-total","mob-time-total"].forEach(id => document.getElementById(id).textContent = "0:00");
    renderAll();
    if (autoplay) { audio.play(); isPlaying = true; } else { isPlaying = false; }
    updatePlayIcons();
  }

  function updatePlayIcons() {
    const icon = isPlaying ? "pause" : "play_arrow";
    document.getElementById("play-icon").textContent = icon;
    document.getElementById("mob-play-icon").textContent = icon;
  }

  function trackHTML(t, i, isActive) {
    return `<div class="track-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg cursor-pointer transition-all border border-transparent ${isActive ? 'active' : 'hover:bg-surface-container-high/50'}" data-index="${i}" style="${isActive ? 'background:rgba(25,22,18,0.7)' : ''}">
      <span style="font-size:9px;font-weight:700;color:#7a7280;width:14px">${String(i+1).padStart(2,"0")}</span>
      <div class="flex-1 min-w-0">
        <p class="track-title text-xs font-bold truncate ${isActive ? '' : 'opacity-50'}" style="color:#e9e1de">${t.title}</p>
        <p class="track-artist font-bold uppercase truncate ${isActive ? '' : 'opacity-30'}" style="font-size:8px;letter-spacing:0.15em;color:${isActive ? '#89CFF0' : '#7a7280'}">${t.artist}</p>
      </div>
      ${isActive && isPlaying ? '<span class="material-symbols-outlined" style="font-size:12px;color:#cfbcff">equalizer</span>' : ''}
    </div>`;
  }

  function renderAll() {
    const html = TRACKS.map((t, i) => trackHTML(t, i, i === currentIndex)).join("");
    ["sidebar-tracklist","mobile-tracklist","mobile-main-tracklist"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = html;
      el.querySelectorAll(".track-item").forEach(item => {
        item.addEventListener("click", () => { loadTrack(parseInt(item.dataset.index), true); closeDrawer(); });
      });
    });
    const upnext = document.getElementById("upnext-list");
    if (upnext) {
      upnext.innerHTML = [1,2,3].map(i => {
        const idx = (currentIndex + i) % TRACKS.length;
        const t = TRACKS[idx];
        return `<div class="flex items-center gap-3 px-3 py-3 rounded-lg cursor-pointer transition-all" style="border:1px solid rgba(255,255,255,0.04)" onmouseenter="this.style.background='rgba(42,38,35,0.5)'" onmouseleave="this.style.background=''" data-index="${idx}">
          <span style="font-size:9px;font-weight:700;color:#7a7280">${String(i).padStart(2,"0")}</span>
          <div class="flex-1">
            <p style="font-size:12px;font-weight:700;color:rgba(233,225,222,0.5)">${t.title.toUpperCase()}</p>
            <p style="font-size:8px;font-weight:700;color:rgba(137,207,240,0.35);letter-spacing:0.15em">${t.artist.toUpperCase()}</p>
          </div>
        </div>`;
      }).join("");
      upnext.querySelectorAll("[data-index]").forEach(el => {
        el.addEventListener("click", () => loadTrack(parseInt(el.dataset.index), true));
      });
    }
  }

  // Controls
  document.getElementById("btn-play").addEventListener("click", togglePlay);
  document.getElementById("btn-prev").addEventListener("click", prevTrack);
  document.getElementById("btn-next").addEventListener("click", nextTrack);
  document.getElementById("btn-download").addEventListener("click", downloadCurrent);
  document.getElementById("mob-btn-play").addEventListener("click", togglePlay);
  document.getElementById("mob-btn-prev").addEventListener("click", prevTrack);
  document.getElementById("mob-btn-next").addEventListener("click", nextTrack);
  document.getElementById("mob-btn-download").addEventListener("click", downloadCurrent);

  document.getElementById("btn-shuffle").addEventListener("click", () => {
    isShuffle = !isShuffle;
    document.getElementById("btn-shuffle").style.color = isShuffle ? "#89CFF0" : "#7a7280";
  });
  document.getElementById("btn-repeat").addEventListener("click", () => {
    isRepeat = !isRepeat;
    document.getElementById("btn-repeat").style.color = isRepeat ? "#89CFF0" : "#7a7280";
  });

  function togglePlay() {
    if (!audio.src || audio.src === window.location.href) { loadTrack(0, true); return; }
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else { audio.play(); isPlaying = true; }
    updatePlayIcons(); renderAll();
  }
  function prevTrack() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    loadTrack((currentIndex - 1 + TRACKS.length) % TRACKS.length, isPlaying);
  }
  function nextTrack() {
    loadTrack(isShuffle ? Math.floor(Math.random()*TRACKS.length) : (currentIndex+1)%TRACKS.length, isPlaying);
  }

  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("mob-progress-fill").style.width = pct + "%";
    const cur = fmt(audio.currentTime), tot = fmt(audio.duration);
    ["time-current","mob-time-current"].forEach(id => document.getElementById(id).textContent = cur);
    ["time-total","mob-time-total"].forEach(id => document.getElementById(id).textContent = tot);
    // update tape counter
    const el = document.getElementById("tape-timer");
    if (el) {
      const h = Math.floor(audio.currentTime/3600), m = Math.floor((audio.currentTime%3600)/60), s = Math.floor(audio.currentTime%60);
      el.textContent = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
  });

  [["progress-rail","progress-fill"],["mob-progress-rail","mob-progress-fill"]].forEach(([railId]) => {
    document.getElementById(railId).addEventListener("click", (e) => {
      const r = e.currentTarget.getBoundingClientRect();
      if (audio.duration) audio.currentTime = ((e.clientX-r.left)/r.width) * audio.duration;
    });
  });
  document.getElementById("volume-rail").addEventListener("click", (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const vol = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
    audio.volume = vol;
    document.getElementById("volume-fill").style.width = (vol*100) + "%";
  });

  audio.addEventListener("ended", () => { if (isRepeat) { audio.play(); return; } nextTrack(); });

  document.getElementById("search-input").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".track-item").forEach(el => {
      const t = TRACKS[parseInt(el.dataset.index)];
      el.style.display = (t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q)) ? "" : "none";
    });
  });

  document.getElementById("open-drawer").addEventListener("click", () => {
    document.getElementById("mobile-drawer").classList.add("open");
    document.getElementById("drawer-overlay").classList.add("open");
  });
  document.getElementById("close-drawer").addEventListener("click", closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
  function closeDrawer() {
    document.getElementById("mobile-drawer").classList.remove("open");
    document.getElementById("drawer-overlay").classList.remove("open");
  }

  loadTrack(0, false);
</script>
</body>
</html>
