<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit — jestR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --grain-opacity:.07;--scanline-opacity:.045;--vignette-strength:.72;
  --jestr-blue:#2D5BFF;--jestr-green:#00C896;--jestr-purple:#7B2FFF;--jestr-red:#E8003D;
  --baby-blue:#7EC8E3;
  --win-bg:rgba(8,5,22,.62);
  --win-border:rgba(150,100,255,.28);
  --win-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(45,91,255,.07),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3);
  --win-radius:18px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#06040f;color:#e9e1de;}
#space-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(60,20,120,.55) 0%,transparent 70%),
             radial-gradient(ellipse 60% 50% at 20% 70%,rgba(0,80,180,.35) 0%,transparent 65%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,160,120,.2) 0%,transparent 60%),#06040f;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:var(--grain-opacity);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grain-shift .1s steps(1) infinite;mix-blend-mode:overlay;}
@keyframes grain-shift{0%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0,0)}}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:199;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,.018) 2px,rgba(0,255,180,.018) 3px);}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:198;
  background:radial-gradient(ellipse at center,transparent 32%,rgba(3,2,10,var(--vignette-strength)) 100%);}
.phosphor{text-shadow:0 0 8px rgba(0,200,150,.4),0 0 2px rgba(0,200,150,.2);}
.planet-glow{filter:blur(55px);background:radial-gradient(circle,var(--jestr-purple) 0%,var(--jestr-blue) 60%,var(--jestr-green) 100%);animation:ppulse 9s infinite alternate;opacity:.7;}
@keyframes ppulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.08);opacity:.82}}
.ring-far{animation:ring-expand 12s linear infinite;}
.ring-near{animation:ring-expand 9s linear infinite 1.5s;}
@keyframes ring-expand{0%{transform:scale(.4);opacity:.6}80%{opacity:.1}100%{transform:scale(1.6);opacity:0}}
@keyframes vhs-flicker{0%,96%,100%{opacity:1}97%{opacity:.88}98%{opacity:1}99%{opacity:.92}}
.vhs-flicker{animation:vhs-flicker 5s infinite;}
.tape-counter{font-variant-numeric:tabular-nums;letter-spacing:.15em;font-size:9px;color:rgba(0,200,150,.65);font-weight:700;text-transform:uppercase;}
.no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

/* ============ WINDOW CHROME ============ */
.win{
  position:fixed;z-index:300;
  background:var(--win-bg);
  backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
  -webkit-backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
  border:1px solid var(--win-border);
  border-radius:var(--win-radius);
  box-shadow:var(--win-shadow);
  user-select:none;overflow:hidden;
  display:flex;flex-direction:column;
}
.win::before{
  content:"";position:absolute;inset:0;border-radius:var(--win-radius);pointer-events:none;
  background:
    radial-gradient(circle 18px at 0% 0%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 100% 0%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 0% 100%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 100% 100%,rgba(126,200,227,.25) 0%,transparent 70%);
  opacity:.6;transition:opacity .3s;z-index:0;
}
.win:hover::before{opacity:1;}
.win-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px 8px;
  border-bottom:1px solid rgba(150,100,255,.12);
  cursor:grab;flex-shrink:0;position:relative;z-index:2;
}
.win-bar:active{cursor:grabbing;}
.win-bar-left{display:flex;align-items:center;gap:6px;}
.win-bar-right{display:flex;align-items:center;gap:4px;}
.win-title{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,200,150,.65);}
.win-close{
  width:20px;height:20px;border-radius:50%;
  background:rgba(232,0,61,.18);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(255,255,255,.12);border-left-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.35);border-right-color:rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(232,0,61,.5);
  transition:background .15s,color .15s,box-shadow .12s,transform .08s,border-color .12s;
  box-shadow:0 2px 4px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
}
.win-close:hover{background:rgba(232,0,61,.45);color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.5),0 0 12px rgba(232,0,61,.45);}
.win-close:active{transform:scale(.9) translateY(1px);box-shadow:0 1px 2px rgba(0,0,0,.6),inset 0 3px 5px rgba(0,0,0,.5);border-top-color:rgba(0,0,0,.3);border-bottom-color:rgba(255,255,255,.06);}
.win-resize{position:absolute;width:20px;height:20px;z-index:10;opacity:0;}
.win-resize.nw{top:0;left:0;cursor:nw-resize;}
.win-resize.ne{top:0;right:0;cursor:ne-resize;}
.win-resize.sw{bottom:0;left:0;cursor:sw-resize;}
.win-resize.se{bottom:0;right:0;cursor:se-resize;}
.win-body{flex:1;overflow:hidden;position:relative;z-index:1;display:flex;flex-direction:column;}

/* ============ ANALOG BUTTONS (shared by ALL interactive buttons) ============ */
.ctrl-btn,
.taskbar-btn,
.m-tab{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(255,255,255,.12);
  border-left-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.35);
  border-right-color:rgba(0,0,0,.2);
  border-radius:8px;cursor:pointer;padding:5px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,box-shadow .12s,transform .07s,border-color .12s,color .12s;
  backdrop-filter:blur(8px);color:var(--baby-blue);
  box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);
}
.ctrl-btn:hover,
.taskbar-btn:hover,
.m-tab:hover{
  background:rgba(126,200,227,.12);
  box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.10);
}
.ctrl-btn:active,
.taskbar-btn:active,
.m-tab:active{
  transform:scale(.95) translateY(1px);
  background:rgba(0,0,0,.18);
  border-top-color:rgba(0,0,0,.3);
  border-left-color:rgba(0,0,0,.2);
  border-bottom-color:rgba(255,255,255,.06);
  box-shadow:0 1px 2px rgba(0,0,0,.5),inset 0 2px 4px rgba(0,0,0,.35);
}
/* latched / active state */
.ctrl-btn.active-state,
.taskbar-btn.win-open,
.m-tab.active{
  background:rgba(10,6,30,.70);
  border-top-color:rgba(0,0,0,.45);
  border-left-color:rgba(0,0,0,.35);
  border-bottom-color:rgba(255,255,255,.08);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.55),inset 0 1px 2px rgba(0,0,0,.35);
  transform:translateY(1px);
  color:rgba(200,180,255,.96);
}

.play-btn{
  background:linear-gradient(135deg,var(--jestr-purple),var(--jestr-blue));
  box-shadow:0 0 22px rgba(123,47,255,.55),0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.22);
  transition:box-shadow .15s,transform .08s;border:none;cursor:pointer;
}
.play-btn:hover{box-shadow:0 0 34px rgba(45,91,255,.75),0 3px 12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25);}
.play-btn:active{transform:scale(.93) translateY(1px);box-shadow:0 0 14px rgba(123,47,255,.4),0 1px 3px rgba(0,0,0,.6),inset 0 3px 6px rgba(0,0,0,.35);}

/* ============ SCRUBBERS ============ */
.progress-wrap,.volume-wrap{position:relative;height:22px;display:flex;align-items:center;cursor:pointer;flex:1;user-select:none;-webkit-user-select:none;touch-action:none;}
.progress-track-bg,.volume-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.1);transition:height .12s;}
.progress-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:linear-gradient(90deg,var(--jestr-purple),var(--jestr-blue),var(--jestr-green));pointer-events:none;transition:height .12s;}
.volume-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:var(--jestr-green);pointer-events:none;transition:height .12s;}
.progress-thumb,.volume-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#fff;pointer-events:none;opacity:0;transition:opacity .15s,transform .1s;z-index:2;}
.progress-thumb{box-shadow:0 0 0 3px rgba(123,47,255,.5),0 2px 8px rgba(0,0,0,.6);}
.volume-thumb{box-shadow:0 0 0 3px rgba(0,200,150,.5),0 2px 8px rgba(0,0,0,.6);}
.progress-wrap:hover .progress-thumb,.progress-wrap.dragging .progress-thumb,
.volume-wrap:hover .volume-thumb,.volume-wrap.dragging .volume-thumb{opacity:1;}
.progress-wrap:hover .progress-track-bg,.progress-wrap:hover .progress-fill-bar,
.progress-wrap.dragging .progress-track-bg,.progress-wrap.dragging .progress-fill-bar,
.volume-wrap:hover .volume-track-bg,.volume-wrap:hover .volume-fill-bar,
.volume-wrap.dragging .volume-track-bg,.volume-wrap.dragging .volume-fill-bar{height:5px;}
.progress-wrap.dragging .progress-thumb,.volume-wrap.dragging .volume-thumb{transform:translate(-50%,-50%) scale(1.2);}
#vol-icon{cursor:pointer;transition:color .2s,text-shadow .2s;}
#vol-icon.muted{color:var(--jestr-red)!important;text-shadow:0 0 8px rgba(232,0,61,.5);}

/* ============ SEARCH ============ */
.search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(123,47,255,.2);border-radius:10px;padding:0 10px;height:34px;transition:border-color .2s,box-shadow .2s;}
.search-wrap:focus-within{border-color:rgba(123,47,255,.55);box-shadow:0 0 0 3px rgba(123,47,255,.08);}
.search-wrap .material-symbols-outlined{font-size:15px;color:rgba(110,104,117,.6);flex-shrink:0;}
.search-wrap input{background:transparent!important;border:none!important;outline:none!important;color:#e9e1de;font-size:11px;font-family:inherit;width:100%;padding:0;}
.search-wrap input::placeholder{color:rgba(110,104,117,.45);}

/* ============ TRACK ITEMS + DROP INDICATOR ============ */
.track-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .15s,border-color .15s,transform .12s;}
.track-item:hover{background:rgba(45,91,255,.07);}
.track-item.active{background:rgba(45,91,255,.12)!important;border-color:rgba(123,47,255,.3)!important;}
.track-item.active .track-title{color:#e9e1de!important;}
.track-item.active .track-artist{color:var(--jestr-green)!important;}
.track-item.dragging-item{opacity:.3;transform:scale(.97);}
.drag-handle{cursor:grab;color:rgba(110,104,117,.3);display:flex;align-items:center;flex-shrink:0;transition:color .15s;padding:2px;}
.drag-handle:hover{color:rgba(0,200,150,.6);}
.drag-handle:active{cursor:grabbing;}
/* glowing drop line */
.drop-indicator{
  height:3px;border-radius:999px;
  background:linear-gradient(90deg,transparent 0%,var(--jestr-purple) 20%,var(--jestr-blue) 50%,var(--jestr-green) 80%,transparent 100%);
  margin:2px 10px;
  box-shadow:0 0 8px rgba(123,47,255,.8),0 0 16px rgba(0,200,150,.4);
  pointer-events:none;
}

/* ============ GALLERY ============ */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:2px;}
.gallery-item{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid rgba(123,47,255,.18);background:rgba(15,10,35,.5);transition:transform .18s,box-shadow .18s,border-color .18s;aspect-ratio:1/1;}
.gallery-item:hover{transform:scale(1.03);box-shadow:0 0 18px rgba(123,47,255,.4);border-color:rgba(123,47,255,.5);}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}

/* ============ LIGHTBOX ============ */
#gallery-lightbox{display:none;position:fixed;inset:0;z-index:600;background:rgba(3,2,10,.93);backdrop-filter:blur(22px);align-items:center;justify-content:center;}
#gallery-lightbox.open{display:flex;}
#lb-img{max-width:92vw;max-height:86vh;border-radius:14px;box-shadow:0 0 80px rgba(123,47,255,.45),0 0 20px rgba(0,0,0,.8);}
#lb-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#e9e1de;transition:background .15s;}
#lb-close:hover{background:rgba(232,0,61,.2);border-color:rgba(232,0,61,.4);color:var(--jestr-red);}

/* ============ DOCK WINDOW (bottom nav — desktop) ============ */
#dock-win{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  width:min(500px,94vw);z-index:400;border-radius:14px;
}
#dock-win .win-body{
  flex-direction:row;align-items:center;justify-content:center;
  gap:8px;padding:6px 14px;
}
.dock-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-right:6px;flex-shrink:0;}
.dock-logo-main{font-size:15px;font-weight:900;font-style:italic;color:var(--jestr-purple);letter-spacing:-.03em;}
.dock-logo-sub{font-size:7px;font-weight:700;letter-spacing:.25em;color:rgba(0,200,150,.5);text-transform:uppercase;}
.dock-divider{width:1px;height:30px;background:rgba(100,60,200,.2);margin:0 4px;flex-shrink:0;}
/* taskbar-btn overrides for dock */
.taskbar-btn{flex-direction:column;align-items:center;gap:3px;min-width:60px;padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(200,180,255,.7);}
.taskbar-btn .material-symbols-outlined{font-size:18px;}
.taskbar-dot{width:4px;height:4px;border-radius:50%;background:var(--jestr-green);opacity:0;box-shadow:0 0 6px rgba(0,200,150,.8);transition:opacity .2s;margin-top:-1px;}
.taskbar-btn.win-open .taskbar-dot{opacity:1;}
.taskbar-btn.win-open .material-symbols-outlined{color:var(--jestr-green);text-shadow:0 0 8px rgba(0,200,150,.4);}

/* ============ MOBILE NAV DOCK ============ */
#mobile-dock{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(6,4,18,.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(100,60,200,.18);
  padding:6px 16px calc(6px + env(safe-area-inset-bottom));
  align-items:center;justify-content:space-around;
  gap:0;
}
.mob-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 16px;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-top-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.3);
  color:rgba(200,180,255,.5);
  font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  transition:background .12s,box-shadow .12s,transform .07s,color .12s,border-color .12s;
  box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  flex:1;max-width:90px;
}
.mob-btn .material-symbols-outlined{font-size:22px;}
.mob-btn:hover{background:rgba(126,200,227,.1);}
.mob-btn:active{transform:scale(.94) translateY(1px);background:rgba(0,0,0,.2);box-shadow:0 1px 2px rgba(0,0,0,.5),inset 0 2px 4px rgba(0,0,0,.35);border-top-color:rgba(0,0,0,.3);}
.mob-btn.active{background:rgba(10,6,30,.75);border-top-color:rgba(0,0,0,.45);border-bottom-color:rgba(255,255,255,.07);box-shadow:inset 0 2px 6px rgba(0,0,0,.5);transform:translateY(1px);color:var(--jestr-green);}
.mob-btn.active .material-symbols-outlined{text-shadow:0 0 8px rgba(0,200,150,.5);}
.mob-dot{width:4px;height:4px;border-radius:50%;background:var(--jestr-green);opacity:0;box-shadow:0 0 6px rgba(0,200,150,.8);transition:opacity .2s;}
.mob-btn.active .mob-dot{opacity:1;}

/* ============ MOBILE LAYOUT ============ */
:root{--mob-dock-h:70px;}
@media(max-width:767px){
  #dock-win{display:none;}
  #mobile-dock{display:flex;}
  #planet-bg{display:none;}

  /* Player pinned at bottom above dock */
  #player-win{
    position:fixed!important;
    left:0!important;right:0!important;
    bottom:var(--mob-dock-h)!important;
    top:auto!important;
    width:100%!important;max-width:100%!important;min-width:0!important;
    border-radius:16px 16px 0 0!important;
    border-left:none!important;border-right:none!important;border-bottom:none!important;
    z-index:350!important;
  }
  /* Tracklist fills space between top and player */
  #tracklist-win{
    position:fixed!important;
    left:0!important;right:0!important;
    top:0!important;
    bottom:calc(var(--mob-dock-h) + var(--mob-player-h, 190px))!important;
    width:100%!important;max-width:100%!important;
    border-radius:0!important;
    border-left:none!important;border-right:none!important;border-top:none!important;
    z-index:340!important;
  }
  /* Gallery overlays the tracklist area when open */
  #gallery-win{
    position:fixed!important;
    left:0!important;right:0!important;
    top:0!important;
    bottom:calc(var(--mob-dock-h) + var(--mob-player-h, 190px))!important;
    width:100%!important;max-width:100%!important;
    border-radius:0!important;
    border-left:none!important;border-right:none!important;border-top:none!important;
    z-index:345!important;
  }
}
@media(min-width:768px){
  #planet-bg{bottom:80px;}
}
</style>
<script id="tc">tailwind.config={darkMode:"class",theme:{extend:{fontFamily:{headline:["Plus Jakarta Sans"],body:["Plus Jakarta Sans"]}}}}</script>
</head>
<body>
<div id="space-bg"></div>
<canvas id="stars-canvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain-overlay"></div>
<audio id="audio-player" preload="auto"></audio>

<!-- PLANET -->
<div id="planet-bg" style="position:fixed;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none">
  <div style="position:relative;width:320px;height:320px">
    <div class="planet-glow" style="position:absolute;inset:0;border-radius:50%"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;border-radius:50%;border:1px solid rgba(45,91,255,.07)" class="ring-far"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;height:340px;border-radius:50%;border:1px solid rgba(123,47,255,.09)" class="ring-near"></div>
    <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;background:rgba(15,10,35,.32);backdrop-filter:blur(18px);border:1px solid rgba(123,47,255,.14)">
      <div style="width:100%;height:100%;background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 0);background-size:12px 12px;opacity:.18"></div>
    </div>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:32px">
      <p class="tape-counter phosphor" style="margin-bottom:10px">NOW PLAYING</p>
      <h2 id="focal-title" style="font-size:2.4rem;font-weight:900;font-style:italic;letter-spacing:-.03em;line-height:1;color:#e9e1de;text-shadow:0 0 40px rgba(123,47,255,.5);margin-bottom:10px">—</h2>

<script>
/* STARS */
(function(){
  const c=document.getElementById("stars-canvas"),ctx=c.getContext("2d");let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function mkStars(){stars=[];const n=Math.floor((W*H)/2800);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.15,a:Math.random(),da:(Math.random()-.5)*.005,speed:Math.random()*.035+.004});}
  function draw(){ctx.clearRect(0,0,W,H);for(const s of stars){s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;s.y+=s.speed;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,210,255,${Math.max(0,Math.min(1,s.a))})`;ctx.fill();}requestAnimationFrame(draw);}
  resize();mkStars();draw();window.addEventListener("resize",()=>{resize();mkStars();});
})();

function isMob(){return window.innerWidth<768;}

/* MOBILE: measure player height so tracklist knows where to stop */
function updateMobPlayerHeight(){
  if(!isMob())return;
  const pl=document.getElementById("player-win");
  const dockH=document.getElementById("mobile-dock").offsetHeight||70;
  const plH=pl.offsetHeight||190;
  document.documentElement.style.setProperty("--mob-player-h",plH+"px");

/* MOBILE TOGGLE — each icon independently shows/hides its window */
function setMobActive(btnId,on){
  const btn=document.getElementById(btnId);

function mobToggle(winId,btnId){

/* DESKTOP CENTERED LAYOUT AROUND PLANET */
function applyDesktopLayout(){
  if(isMob())return;
  const vw=window.innerWidth,vh=window.innerHeight;
  const dock=document.getElementById("dock-win");
  const dockH=(dock?dock.offsetHeight:0)||70;
  const usableH=vh-dockH-10;
  const centerX=vw/2, centerY=usableH/2;
  const GAP=20;

  const tl=document.getElementById("tracklist-win");
  const g=document.getElementById("gallery-win");
  const pl=document.getElementById("player-win");

  const tlW=Math.min(290,vw*0.23), tlH=Math.min(540,usableH-40);
  const gW=Math.min(340,vw*0.26),  gH=Math.min(480,usableH-40);
  const plW=Math.min(380,vw*0.30), plH=210;

  tl.style.width=tlW+"px"; tl.style.height=tlH+"px";
  g.style.width=gW+"px";   g.style.height=gH+"px";
  pl.style.width=plW+"px"; pl.style.height=plH+"px";

  /* Tracklist: left of planet */
  tl.style.left=(centerX-tlW-GAP)+"px";
  tl.style.top=Math.max(16,centerY-tlH/2)+"px";

  /* Gallery: right of planet */
  g.style.left=(centerX+GAP)+"px";
  g.style.top=Math.max(16,centerY-gH/2)+"px";

  /* Player: centered below planet */
  pl.style.left=(centerX-plW/2)+"px";
  pl.style.top=Math.min(usableH-plH-16,centerY+160)+"px";

  tl.style.bottom=g.style.bottom=pl.style.bottom="";
}

/* WINDOW MANAGER */
function makeWindowDraggable(winId,barId){
  const win=document.getElementById(winId),bar=document.getElementById(barId);
  let mode=null,sx,sy,sl,st,sw,sh;
  function pin(){
    if(isMob())return;
    const r=win.getBoundingClientRect();
    win.style.left=r.left+"px";win.style.top=r.top+"px";
    win.style.width=r.width+"px";win.style.height=(r.height>0?r.height:win.offsetHeight)+"px";
    win.style.bottom="";win.style.right="";
  }
  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
  function onDown(e,m){
    if(isMob())return;pin();
    const r=win.getBoundingClientRect();mode=m;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    sx=cx;sy=cy;sl=r.left;st=r.top;sw=r.width;sh=r.height;
    e.preventDefault();
    const wins=document.querySelectorAll(".win");let maxZ=300;
    wins.forEach(w=>{const z=parseInt(w.style.zIndex||300);if(z>maxZ)maxZ=z;});
    win.style.zIndex=maxZ+1;
  }
  function onMove(e){
    if(!mode)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    const dx=cx-sx,dy=cy-sy,mw=260,mh=120,vw=window.innerWidth,vh=window.innerHeight;
    if(mode==="drag"){win.style.left=clamp(sl+dx,0,vw-sw)+"px";win.style.top=clamp(st+dy,0,vh-sh)+"px";}
    else{
      let l=sl,t=st,w=sw,h=sh;
      if(mode==="se"){w=clamp(sw+dx,mw,900);h=clamp(sh+dy,mh,800);}
      if(mode==="sw"){const nw=clamp(sw-dx,mw,900);l=sl+sw-nw;w=nw;h=clamp(sh+dy,mh,800);}
      if(mode==="ne"){w=clamp(sw+dx,mw,900);const nh=clamp(sh-dy,mh,800);t=st+sh-nh;h=nh;}
      if(mode==="nw"){const nw=clamp(sw-dx,mw,900);l=sl+sw-nw;w=nw;const nh=clamp(sh-dy,mh,800);t=st+sh-nh;h=nh;}
      win.style.left=l+"px";win.style.top=t+"px";win.style.width=w+"px";win.style.height=h+"px";
    }
  }
  function onUp(){mode=null;}
  bar.addEventListener("mousedown",e=>onDown(e,"drag"));
  bar.addEventListener("touchstart",e=>onDown(e,"drag"),{passive:false});
  win.querySelectorAll(".win-resize").forEach(el=>{
    el.addEventListener("mousedown",e=>{onDown(e,el.dataset.dir);e.stopPropagation();});
    el.addEventListener("touchstart",e=>{onDown(e,el.dataset.dir);e.stopPropagation();},{passive:false});
  });
  window.addEventListener("mousemove",onMove);
  window.addEventListener("touchmove",e=>{if(mode){e.preventDefault();onMove(e);}},{passive:false});
  window.addEventListener("mouseup",onUp);
  window.addEventListener("touchend",onUp);
}

const audio=document.getElementById("audio-player");
let currentIndex=0,isPlaying=false,isShuffle=false,repeatMode=0;
let seekOnReady=null,isSeeking=false,durationPollTimer=null;
let isMuted=false,premuteVolume=0.8;

function fmt(s){if(s===null||s===undefined||isNaN(s)||!isFinite(s)||s<0)return"0:00";return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;}
function isGoodDuration(d){return typeof d==="number"&&isFinite(d)&&d>0&&d<18000;}
function tryUpdateDuration(){const dur=audio.duration;if(isGoodDuration(dur)){document.getElementById("time-total").textContent=fmt(dur);return true;}return false;}
function startDurationPoll(){
  if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}
  const deadline=Date.now()+30000;
  durationPollTimer=setInterval(()=>{if(tryUpdateDuration()){clearInterval(durationPollTimer);durationPollTimer=null;return;}if(Date.now()>=deadline){clearInterval(durationPollTimer);durationPollTimer=null;}},500);
}
function applySavedSeek(){if(seekOnReady!==null&&audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=seekOnReady*audio.duration;seekOnReady=null;tryUpdateDuration();}}
audio.addEventListener("loadedmetadata",()=>{tryUpdateDuration();applySavedSeek();});
audio.addEventListener("canplay",()=>{tryUpdateDuration();applySavedSeek();});
audio.addEventListener("durationchange",()=>{tryUpdateDuration();applySavedSeek();});

function setProgress(pct){document.getElementById("progress-fill").style.width=pct+"%";document.getElementById("progress-thumb").style.left=pct+"%";}
function seekToPct(pct){pct=Math.max(0,Math.min(1,pct));setProgress(pct*100);if(audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=pct*audio.duration;seekOnReady=null;}else{seekOnReady=pct;}}
function skip(sec){if(audio.readyState>=1&&isGoodDuration(audio.duration))audio.currentTime=Math.max(0,Math.min(audio.duration,(audio.currentTime||0)+sec));}
function clientXToFraction(clientX,rail){const r=rail.getBoundingClientRect();return Math.max(0,Math.min(1,(clientX-r.left)/r.width));}

function makeScrubber(railId,onScrub,onEnd){
  const rail=document.getElementById(railId);let drag=false;
  function start(x){drag=true;rail.classList.add("dragging");onScrub(clientXToFraction(x,rail));}
  function move(x){if(!drag)return;onScrub(clientXToFraction(x,rail));}
  function end(){if(!drag)return;drag=false;rail.classList.remove("dragging");if(onEnd)onEnd();}
  rail.addEventListener("mousedown",e=>{start(e.clientX);e.preventDefault();});
  window.addEventListener("mousemove",e=>{if(drag)move(e.clientX);});
  window.addEventListener("mouseup",end);
  rail.addEventListener("touchstart",e=>{start(e.touches[0].clientX);e.preventDefault();},{passive:false});
  window.addEventListener("touchmove",e=>{if(!drag)return;e.preventDefault();move(e.touches[0].clientX);},{passive:false});
  window.addEventListener("touchend",end);
}
makeScrubber("progress-rail",pct=>{isSeeking=true;seekToPct(pct);},()=>{isSeeking=false;});

function volIconName(pct,muted){if(muted||pct===0)return"volume_off";if(pct<0.4)return"volume_down";return"volume_up";}
function updateVolUI(pct,muted){
  document.getElementById("volume-fill").style.width=(pct*100)+"%";
  document.getElementById("volume-thumb").style.left=(pct*100)+"%";
  document.getElementById("volume-pct").textContent=Math.round(pct*100)+"%";
  const icon=document.getElementById("vol-icon");
  icon.textContent=volIconName(pct,muted);
  muted?icon.classList.add("muted"):icon.classList.remove("muted");
}
function setVolume(pct){pct=Math.max(0,Math.min(1,pct));if(isMuted)isMuted=false;premuteVolume=pct;audio.volume=pct;updateVolUI(pct,false);}
function toggleMute(){isMuted=!isMuted;if(isMuted){premuteVolume=audio.volume>0?audio.volume:premuteVolume;audio.volume=0;updateVolUI(0,true);}else{audio.volume=premuteVolume;updateVolUI(premuteVolume,false);}}
document.getElementById("vol-icon").addEventListener("click",toggleMute);
makeScrubber("volume-rail",pct=>setVolume(pct));

audio.addEventListener("timeupdate",()=>{
  const dur=audio.duration,cur=audio.currentTime;
  if(cur>0&&!isGoodDuration(dur)){if(tryUpdateDuration()&&durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}}
  if(isGoodDuration(dur)){document.getElementById("time-total").textContent=fmt(dur);document.getElementById("time-current").textContent=fmt(cur);if(!isSeeking)setProgress((cur/dur)*100);}else{document.getElementById("time-current").textContent=fmt(cur);}
});
audio.addEventListener("ended",()=>{
  if(repeatMode===2){audio.currentTime=0;audio.play();return;}
  if(repeatMode===1){loadTrack((currentIndex+1)%TRACKS.length,true);return;}
  if(currentIndex<TRACKS.length-1){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):currentIndex+1,true);}else{isPlaying=false;updatePlayIcons();renderAll();}
});

function loadTrack(index,autoplay=false){
  currentIndex=index;seekOnReady=null;isSeeking=false;
  if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}
  const t=TRACKS[index];audio.src=t.file;audio.load();startDurationPoll();
  document.getElementById("focal-title").textContent=t.title;
  document.getElementById("focal-artist").textContent=t.artist;
  document.getElementById("fp-title").textContent=t.title;
  document.getElementById("fp-artist").textContent=t.artist;
  setProgress(0);document.getElementById("time-current").textContent="0:00";document.getElementById("time-total").textContent="0:00";
  renderAll();
  if(autoplay){audio.play().then(()=>{isPlaying=true;updatePlayIcons();renderAll();}).catch(()=>{});}else{isPlaying=false;}
  updatePlayIcons();
}

function updateRepeatUI(){
  const btn=document.getElementById("btn-repeat"),icon=document.getElementById("repeat-icon");
  if(repeatMode===0){btn.style.color="var(--baby-blue)";icon.textContent="repeat";btn.title="Repeat Off";btn.classList.remove("active-state");}
  else if(repeatMode===1){btn.style.color="var(--jestr-red)";icon.textContent="repeat";btn.title="Repeat All";btn.classList.add("active-state");}
  else{btn.style.color="var(--jestr-red)";icon.textContent="repeat_one";btn.title="Repeat One";btn.classList.add("active-state");}
}
function updateShuffleUI(){
  const btn=document.getElementById("btn-shuffle");
  btn.style.color=isShuffle?"var(--jestr-red)":"var(--baby-blue)";
  isShuffle?btn.classList.add("active-state"):btn.classList.remove("active-state");
}
function updatePlayIcons(){document.getElementById("play-icon").textContent=isPlaying?"pause":"play_arrow";}

/* DRAG-TO-REORDER WITH GLOWING DROP INDICATOR */
let dragSrcIdx=null;let dropIndicator=null;
function ensureDropIndicator(){
  if(!dropIndicator){dropIndicator=document.createElement("div");dropIndicator.className="drop-indicator";}
  return dropIndicator;
}

function trackHTML(t,i,isActive){
  return `<div class="track-item${isActive?" active":""}" data-index="${i}" draggable="true">
    <span class="drag-handle" title="Drag to reorder">
      <span class="material-symbols-outlined" style="font-size:13px">drag_indicator</span>
    </span>
    <span style="font-size:9px;font-weight:700;color:#6e6875;width:16px;flex-shrink:0;text-align:right">${String(i+1).padStart(2,"0")}</span>
    <div style="flex:1;min-width:0">
      <p class="track-title" style="font-size:11px;font-weight:700;color:${isActive?"#e9e1de":"rgba(233,225,222,.45)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title}</p>
      <p class="track-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:${isActive?"var(--jestr-green)":"rgba(110,104,117,.45)"};margin:0">${t.artist}</p>
    </div>
    ${isActive&&isPlaying?"<span class=\"material-symbols-outlined\" style=\"font-size:12px;color:var(--jestr-purple);flex-shrink:0\">equalizer</span>":""}
  </div>`;
}

function bindTrackListEvents(){
  const list=document.getElementById("sidebar-tracklist");
  list.querySelectorAll(".track-item").forEach(el=>{
    const idx=parseInt(el.dataset.index);
    el.addEventListener("click",e=>{if(e.target.closest(".drag-handle"))return;loadTrack(idx,true);});
    el.addEventListener("dragstart",e=>{dragSrcIdx=idx;el.classList.add("dragging-item");e.dataTransfer.effectAllowed="move";});
    el.addEventListener("dragend",()=>{
      dragSrcIdx=null;el.classList.remove("dragging-item");
      if(dropIndicator&&dropIndicator.parentNode)dropIndicator.parentNode.removeChild(dropIndicator);
    });
    el.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";});
    el.addEventListener("dragenter",e=>{
      e.preventDefault();if(dragSrcIdx===null)return;
      const indicator=ensureDropIndicator();
      const rect=el.getBoundingClientRect();
      const before=(e.clientY-rect.top)<rect.height/2;
      const listEl=document.getElementById("sidebar-tracklist");
      if(before)listEl.insertBefore(indicator,el);else listEl.insertBefore(indicator,el.nextSibling);
    });
    el.addEventListener("drop",e=>{
      e.preventDefault();
      const listEl=document.getElementById("sidebar-tracklist");
      if(dragSrcIdx===null||!dropIndicator||!dropIndicator.parentNode)return;
      const children=[...listEl.children];
      let newPos=children.indexOf(dropIndicator);
      if(newPos>dragSrcIdx)newPos--;
      const moved=TRACKS.splice(dragSrcIdx,1)[0];
      TRACKS.splice(newPos,0,moved);
      if(dragSrcIdx===currentIndex)currentIndex=newPos;
      else if(dragSrcIdx<currentIndex&&newPos>=currentIndex)currentIndex--;
      else if(dragSrcIdx>currentIndex&&newPos<=currentIndex)currentIndex++;
      dragSrcIdx=null;if(dropIndicator.parentNode)dropIndicator.parentNode.removeChild(dropIndicator);
      renderAll();
    });
  });
}

function renderAll(){
  const html=TRACKS.map((t,i)=>trackHTML(t,i,i===currentIndex)).join("");
  document.getElementById("sidebar-tracklist").innerHTML=html;
  document.getElementById("track-count").textContent=TRACKS.length+" TRK";
  bindTrackListEvents();
}

function togglePlay(){
  if(!audio.src||audio.src===window.location.href){loadTrack(0,true);return;}
  if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}
  updatePlayIcons();renderAll();
}
function prevTrack(){if((audio.currentTime||0)>3){audio.currentTime=0;return;}loadTrack((currentIndex-1+TRACKS.length)%TRACKS.length,isPlaying);}
function nextTrack(){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):(currentIndex+1)%TRACKS.length,isPlaying);}

document.getElementById("btn-play").addEventListener("click",togglePlay);
document.getElementById("btn-prev").addEventListener("click",prevTrack);
document.getElementById("btn-next").addEventListener("click",nextTrack);
document.getElementById("btn-back10").addEventListener("click",()=>skip(-10));
document.getElementById("btn-fwd10").addEventListener("click",()=>skip(10));
document.getElementById("btn-download").addEventListener("click",()=>{
  const t=TRACKS[currentIndex];const a=document.createElement("a");a.href=t.file;a.download=t.file;a.click();
});
document.getElementById("btn-shuffle").addEventListener("click",()=>{isShuffle=!isShuffle;updateShuffleUI();});
document.getElementById("btn-repeat").addEventListener("click",()=>{repeatMode=(repeatMode+1)%3;updateRepeatUI();});
document.getElementById("search-input").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll("#sidebar-tracklist .track-item").forEach(el=>{
    const t=TRACKS[parseInt(el.dataset.index)];
    el.style.display=(t&&(t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q)))?"":"none";
  });
});

/* INIT */
setVolume(0.8);
updateRepeatUI();
updateShuffleUI();
loadTrack(0,false);
applyDesktopLayout();
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  updateMobPlayerHeight();
}));
</script>
</body>
</html>
