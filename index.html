<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit — jestR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --grain-opacity:.07;--scanline-opacity:.045;--vignette-strength:.72;
  --jestr-blue:#2D5BFF;--jestr-green:#00C896;--jestr-purple:#7B2FFF;--jestr-red:#E8003D;
  --baby-blue:#7EC8E3;
  --win-bg:rgba(8,5,22,.62);
  --win-border:rgba(150,100,255,.28);
  --win-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(45,91,255,.07),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3);
  --win-radius:18px;
  --mob-dock-h:70px;
  --mob-player-h:190px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#06040f;color:#e9e1de;}
#space-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(60,20,120,.55) 0%,transparent 70%),
             radial-gradient(ellipse 60% 50% at 20% 70%,rgba(0,80,180,.35) 0%,transparent 65%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,160,120,.2) 0%,transparent 60%),#06040f;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:var(--grain-opacity);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grain-shift .1s steps(1) infinite;mix-blend-mode:overlay;}
@keyframes grain-shift{0%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0,0)}}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:199;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,.018) 2px,rgba(0,255,180,.018) 3px);}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:198;
  background:radial-gradient(ellipse at center,transparent 32%,rgba(3,2,10,var(--vignette-strength)) 100%);}
.phosphor{text-shadow:0 0 8px rgba(0,200,150,.4),0 0 2px rgba(0,200,150,.2);}
.planet-glow{filter:blur(55px);background:radial-gradient(circle,var(--jestr-purple) 0%,var(--jestr-blue) 60%,var(--jestr-green) 100%);animation:ppulse 9s infinite alternate;opacity:.7;}
@keyframes ppulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.08);opacity:.82}}
.ring-far{animation:ring-expand 12s linear infinite;}
.ring-near{animation:ring-expand 9s linear infinite 1.5s;}
@keyframes ring-expand{0%{transform:scale(.4);opacity:.6}80%{opacity:.1}100%{transform:scale(1.6);opacity:0}}
@keyframes vhs-flicker{0%,96%,100%{opacity:1}97%{opacity:.88}98%{opacity:1}99%{opacity:.92}}
.vhs-flicker{animation:vhs-flicker 5s infinite;}
.tape-counter{font-variant-numeric:tabular-nums;letter-spacing:.15em;font-size:9px;color:rgba(0,200,150,.65);font-weight:700;text-transform:uppercase;}
.no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

/* ============ WINDOW CHROME ============ */
.win{
  position:fixed;z-index:300;
  background:var(--win-bg);
  backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
  -webkit-backdrop-filter:blur(40px) saturate(1.8) brightness(1.05);
  border:1px solid var(--win-border);
  border-radius:var(--win-radius);
  box-shadow:var(--win-shadow);
  user-select:none;overflow:hidden;
  display:flex;flex-direction:column;
}
.win::before{
  content:"";position:absolute;inset:0;border-radius:var(--win-radius);pointer-events:none;
  background:
    radial-gradient(circle 18px at 0% 0%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 100% 0%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 0% 100%,rgba(126,200,227,.25) 0%,transparent 70%),
    radial-gradient(circle 18px at 100% 100%,rgba(126,200,227,.25) 0%,transparent 70%);
  opacity:.6;transition:opacity .3s;z-index:0;
}
.win:hover::before{opacity:1;}
.win-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px 8px;
  border-bottom:1px solid rgba(150,100,255,.12);
  cursor:grab;flex-shrink:0;position:relative;z-index:2;
}
.win-bar:active{cursor:grabbing;}
.win-bar-left{display:flex;align-items:center;gap:6px;}
.win-bar-right{display:flex;align-items:center;gap:4px;}
.win-title{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,200,150,.65);}
.win-close{
  width:20px;height:20px;border-radius:50%;
  background:rgba(232,0,61,.18);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(255,255,255,.12);border-left-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.35);border-right-color:rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(232,0,61,.5);
  transition:background .15s,color .15s,box-shadow .12s,transform .08s,border-color .12s;
  box-shadow:0 2px 4px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
}
.win-close:hover{background:rgba(232,0,61,.45);color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.5),0 0 12px rgba(232,0,61,.45);}
.win-close:active{transform:scale(.9) translateY(1px);}

/* Resize handles: invisible 20x20 corner zones */
.win-resize{position:absolute;width:20px;height:20px;z-index:10;opacity:0;}
.win-resize.nw{top:0;left:0;cursor:nw-resize;}
.win-resize.ne{top:0;right:0;cursor:ne-resize;}
.win-resize.sw{bottom:0;left:0;cursor:sw-resize;}
.win-resize.se{bottom:0;right:0;cursor:se-resize;}

.win-body{flex:1;overflow:hidden;position:relative;z-index:1;display:flex;flex-direction:column;}#player-win{min-height:270px;min-width:300px;}#player-win .win-body{overflow-y:auto;}

/* ============ ANALOG BUTTONS ============ */
.ctrl-btn,.taskbar-btn,.m-tab{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(255,255,255,.12);
  border-left-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.35);
  border-right-color:rgba(0,0,0,.2);
  border-radius:8px;cursor:pointer;padding:5px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,box-shadow .12s,transform .07s,border-color .12s,color .12s;
  backdrop-filter:blur(8px);color:var(--baby-blue);
  box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);
}
.ctrl-btn:hover,.taskbar-btn:hover,.m-tab:hover{background:rgba(126,200,227,.12);box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.10);}
.ctrl-btn:active,.taskbar-btn:active,.m-tab:active{transform:scale(.95) translateY(1px);background:rgba(0,0,0,.18);border-top-color:rgba(0,0,0,.3);border-left-color:rgba(0,0,0,.2);border-bottom-color:rgba(255,255,255,.06);box-shadow:0 1px 2px rgba(0,0,0,.5),inset 0 2px 4px rgba(0,0,0,.35);}
.ctrl-btn.active-state,.taskbar-btn.win-open,.m-tab.active{background:rgba(10,6,30,.70);border-top-color:rgba(0,0,0,.45);border-left-color:rgba(0,0,0,.35);border-bottom-color:rgba(255,255,255,.08);box-shadow:inset 0 2px 6px rgba(0,0,0,.55),inset 0 1px 2px rgba(0,0,0,.35);transform:translateY(1px);color:rgba(200,180,255,.96);}

.play-btn{background:linear-gradient(135deg,var(--jestr-purple),var(--jestr-blue));box-shadow:0 0 22px rgba(123,47,255,.55),0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.22);transition:box-shadow .15s,transform .08s;border:none;cursor:pointer;}
.play-btn:hover{box-shadow:0 0 34px rgba(45,91,255,.75),0 3px 12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25);}
.play-btn:active{transform:scale(.93) translateY(1px);}

/* ============ SCRUBBERS ============ */
.progress-wrap{position:relative;height:22px;display:flex;align-items:center;cursor:pointer;flex:1;user-select:none;-webkit-user-select:none;touch-action:none;}
.progress-track-bg{position:absolute;left:0;right:0;height:3px;border-radius:3px;background:rgba(255,255,255,.1);transition:height .12s;}
.progress-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:3px;border-radius:3px;background:linear-gradient(90deg,var(--jestr-purple),var(--jestr-blue),var(--jestr-green));pointer-events:none;}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#fff;pointer-events:none;opacity:0;transition:opacity .15s,transform .1s;z-index:2;box-shadow:0 0 0 3px rgba(123,47,255,.5),0 2px 8px rgba(0,0,0,.6);}
.progress-wrap:hover .progress-thumb,.progress-wrap.dragging .progress-thumb{opacity:1;}
.progress-wrap:hover .progress-track-bg,.progress-wrap:hover .progress-fill-bar,
.progress-wrap.dragging .progress-track-bg,.progress-wrap.dragging .progress-fill-bar{height:5px;}
.progress-wrap.dragging .progress-thumb{transform:translate(-50%,-50%) scale(1.2);}

/* ============ VOLUME ============ */
.vol-row{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:5px 10px;}
#vol-icon-wrap{display:flex;align-items:center;justify-content:center;width:32px;height:32px;flex-shrink:0;cursor:pointer;border-radius:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#vol-icon{font-size:14px;color:rgba(0,200,150,.65);pointer-events:none;transition:color .2s;}
#vol-icon.muted{color:var(--jestr-red)!important;text-shadow:0 0 8px rgba(232,0,61,.5);}
#vol-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:4px;outline:none;cursor:pointer;
  background:linear-gradient(to right,var(--jestr-green) 0%,var(--jestr-green) var(--vol-pct,80%),rgba(255,255,255,.12) var(--vol-pct,80%),rgba(255,255,255,.12) 100%);
  touch-action:none;
}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 0 3px rgba(0,200,150,.45),0 2px 6px rgba(0,0,0,.6);transition:transform .1s;}
#vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 0 0 3px rgba(0,200,150,.45),0 2px 6px rgba(0,0,0,.6);}
#vol-slider:active::-webkit-slider-thumb{transform:scale(1.25);}
#vol-pct{width:30px;flex-shrink:0;text-align:right;font-size:8px;}

/* ============ SEARCH ============ */
.search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(123,47,255,.2);border-radius:10px;padding:0 10px;height:34px;transition:border-color .2s,box-shadow .2s;}
.search-wrap:focus-within{border-color:rgba(123,47,255,.55);box-shadow:0 0 0 3px rgba(123,47,255,.08);}
.search-wrap .material-symbols-outlined{font-size:15px;color:rgba(110,104,117,.6);flex-shrink:0;}
.search-wrap input{background:transparent!important;border:none!important;outline:none!important;color:#e9e1de;font-size:11px;font-family:inherit;width:100%;padding:0;}
.search-wrap input::placeholder{color:rgba(110,104,117,.45);}

/* ============ TRACK ITEMS ============ */
.track-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 10px;
  border-radius:10px;cursor:pointer;
  border:1px solid transparent;
  transition:background .15s,border-color .15s;
  position:relative;
}
.track-item:hover{background:rgba(45,91,255,.07);}
.track-item.active{background:rgba(45,91,255,.12)!important;border-color:rgba(123,47,255,.3)!important;}
.track-item.active .track-title{color:#e9e1de!important;}
.track-item.active .track-artist{color:var(--jestr-green)!important;}
.track-item.is-dragging{opacity:.3;background:rgba(123,47,255,.06)!important;}

/* Drop line */
#drop-line{
  position:fixed;left:0;right:0;pointer-events:none;z-index:9999;
  height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--jestr-purple) 8%,var(--jestr-blue) 50%,var(--jestr-green) 92%,transparent 100%);
  box-shadow:0 0 10px rgba(123,47,255,.9),0 0 20px rgba(0,200,150,.5);
  border-radius:999px;
  display:none;
}
#drop-line::before,#drop-line::after{
  content:"";position:absolute;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;
  background:var(--jestr-purple);box-shadow:0 0 8px var(--jestr-purple);
}
#drop-line::before{left:4px;}
#drop-line::after{right:4px;background:var(--jestr-green);box-shadow:0 0 8px var(--jestr-green);}

/* Drag handle */
.drag-handle{
  cursor:grab;display:flex;align-items:center;flex-shrink:0;
  padding:6px 6px;margin:-2px;border-radius:6px;
  color:rgba(150,100,255,.4);
  transition:color .15s,background .15s;
  touch-action:none;-webkit-tap-highlight-color:transparent;
}
.drag-handle:hover{color:var(--jestr-purple);background:rgba(123,47,255,.14);}
.drag-handle.grabbing{cursor:grabbing;color:var(--jestr-purple);}

/* ============ GALLERY ============ */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:2px;}
.gallery-item{
  border-radius:10px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(123,47,255,.18);
  background:rgba(15,10,35,.5);
  transition:transform .18s,box-shadow .18s,border-color .18s;
  aspect-ratio:1/1;
}
.gallery-item:hover{transform:scale(1.03);box-shadow:0 0 18px rgba(123,47,255,.4);border-color:rgba(123,47,255,.5);}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}

/* ============ IMAGE VIEWER WINDOW ============ */
#image-win{display:none;}
#image-win .win-body{align-items:center;justify-content:center;background:rgba(3,2,10,.5);padding:10px;overflow:hidden;position:relative;}
.img-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:999px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.12);
  border-top-color:rgba(255,255,255,.18);border-left-color:rgba(255,255,255,.15);
  border-bottom-color:rgba(0,0,0,.5);border-right-color:rgba(0,0,0,.32);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);
  color:var(--baby-blue);
  transition:background .12s,box-shadow .12s,transform .07s,border-color .12s,color .12s;
  z-index:5;
}
.img-nav-prev{left:8px;}
.img-nav-next{right:8px;}
.img-nav:hover{background:rgba(126,200,227,.18);box-shadow:0 4px 10px rgba(0,0,0,.6),0 0 14px rgba(123,47,255,.5);}
.img-nav:active{transform:scale(.95) translateY(1px);box-shadow:0 2px 4px rgba(0,0,0,.6),inset 0 2px 4px rgba(0,0,0,.4);}
.img-nav-icon{font-size:22px;}

@media(max-width:767px){
  .img-nav{width:48px;height:48px;}
  .img-nav-icon{font-size:26px;}
}

/* ============ DESKTOP DOCK ============ */
#dock-win{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(500px,94vw);z-index:400;border-radius:14px;}
#dock-win .win-body{flex-direction:row;align-items:center;justify-content:center;gap:8px;padding:6px 14px;}
.dock-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-right:6px;flex-shrink:0;}
.dock-logo-main{font-size:15px;font-weight:900;font-style:italic;color:var(--jestr-purple);letter-spacing:-.03em;}
.dock-logo-sub{font-size:7px;font-weight:700;letter-spacing:.25em;color:rgba(0,200,150,.5);text-transform:uppercase;}
.dock-divider{width:1px;height:30px;background:rgba(100,60,200,.2);margin:0 4px;flex-shrink:0;}
.taskbar-btn{flex-direction:column;align-items:center;gap:3px;min-width:60px;padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--baby-blue);}
.taskbar-btn .material-symbols-outlined{font-size:18px;}
.taskbar-dot{width:4px;height:4px;border-radius:50%;background:var(--jestr-green);opacity:0;box-shadow:0 0 6px rgba(0,200,150,.8);transition:opacity .2s;margin-top:-1px;}
.taskbar-btn.win-open .taskbar-dot{opacity:1;}
.taskbar-btn.win-open .material-symbols-outlined{color:var(--jestr-green);text-shadow:0 0 8px rgba(0,200,150,.4);}

/* ============ MOBILE NAV DOCK ============ */
#mobile-dock{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(6,4,18,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid rgba(123,47,255,.22);
  padding:8px 16px calc(8px + env(safe-area-inset-bottom));
  align-items:center;justify-content:space-around;
}
.mob-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 18px;border-radius:10px;cursor:pointer;flex:1;max-width:100px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(255,255,255,.13);border-left-color:rgba(255,255,255,.10);
  border-bottom-color:rgba(0,0,0,.38);border-right-color:rgba(0,0,0,.22);
  color:var(--baby-blue);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  transition:background .12s,box-shadow .12s,transform .07s,color .12s,border-color .12s;
  box-shadow:0 2px 5px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);
  -webkit-tap-highlight-color:transparent;
}
.mob-btn .material-symbols-outlined{font-size:22px;}
.mob-btn:active{transform:scale(.94) translateY(1px);}
.mob-btn.active{background:rgba(10,6,30,.78);border-top-color:rgba(0,0,0,.48);border-left-color:rgba(0,0,0,.36);border-bottom-color:rgba(255,255,255,.08);box-shadow:inset 0 2px 6px rgba(0,0,0,.55);transform:translateY(1px);color:var(--jestr-green);}
.mob-btn.active .material-symbols-outlined{text-shadow:0 0 8px rgba(0,200,150,.5);}
.mob-dot{width:4px;height:4px;border-radius:50%;background:var(--jestr-green);opacity:0;box-shadow:0 0 6px rgba(0,200,150,.8);transition:opacity .2s;}
.mob-btn.active .mob-dot{opacity:1;}

/* ============ MOBILE LAYOUT ============ */
@media(max-width:767px){
  #dock-win{display:none;}
  #mobile-dock{display:flex;}
  #planet-bg{display:none;}
  #player-win{
    position:fixed!important;left:0!important;right:0!important;
    bottom:var(--mob-dock-h)!important;top:auto!important;
    width:100%!important;max-width:100%!important;min-width:0!important;
    border-radius:16px 16px 0 0!important;
    border-left:none!important;border-right:none!important;border-bottom:none!important;
  }
  #tracklist-win{
    position:fixed!important;left:0!important;right:0!important;top:0!important;
    bottom:calc(var(--mob-dock-h) + var(--mob-player-h))!important;
    width:100%!important;max-width:100%!important;
    border-radius:0!important;border-left:none!important;border-right:none!important;border-top:none!important;
  }
  #gallery-win{
    position:fixed!important;left:0!important;right:0!important;top:0!important;
    bottom:calc(var(--mob-dock-h) + var(--mob-player-h))!important;
    width:100%!important;max-width:100%!important;
    border-radius:0!important;border-left:none!important;border-right:none!important;border-top:none!important;
  }
  #image-win{
    position:fixed!important;left:5vw!important;top:5vh!important;
    width:90vw!important;height:80vh!important;border-radius:16px!important;
  }
}

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function mkStars(){stars=[];const n=Math.floor((W*H)/2800);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.15,a:Math.random(),da:(Math.random()-.5)*.005,speed:Math.random()*.035+.004});}
  function draw(){ctx.clearRect(0,0,W,H);for(const s of stars){s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;s.y+=s.speed;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,210,255,${Math.max(0,Math.min(1,s.a))})`;ctx.fill();}requestAnimationFrame(draw);}
  resize();mkStars();draw();window.addEventListener('resize',()=>{resize();mkStars();});
})();

function isMob(){return window.innerWidth<768;}

/* ── Z-INDEX ── */
let _zBase=300;
function bringToFront(winId){_zBase++;const w=document.getElementById(winId);if(w)w.style.zIndex=_zBase+10;}

/* ── MOB HEIGHT ── */
function updateMobPlayerHeight(){
  if(!isMob())return;
  const pl=document.getElementById('player-win');
  const dock=document.getElementById('mobile-dock');
  const dockH=dock.offsetHeight||70;
  const plH=(pl&&pl.style.display==='flex'?pl.offsetHeight:0)||190;
  document.documentElement.style.setProperty('--mob-player-h',plH+'px');
  document.documentElement.style.setProperty('--mob-dock-h',dockH+'px');
}
window.addEventListener('resize',updateMobPlayerHeight);

/* ── MOBILE TOGGLE ── */
function setMobActive(id,on){const b=document.getElementById(id);if(b)on?b.classList.add('active'):b.classList.remove('active');}
function mobToggle(winId,btnId){
  const win=document.getElementById(winId);
  const vis=win.style.display==='flex';
  if(vis){win.style.display='none';setMobActive(btnId,false);}
  else{win.style.display='flex';setMobActive(btnId,true);bringToFront(winId);if(winId==='gallery-win')renderGallery();}
  updateMobPlayerHeight();
}

/* ── DESKTOP LAYOUT ── */
function applyDesktopLayout(){
  if(isMob())return;
  const vw=window.innerWidth,vh=window.innerHeight;
  const dock=document.getElementById('dock-win');
  const dockH=dock?dock.offsetHeight:70;
  const usableH=vh-dockH-20;
  const cx=vw/2,cy=usableH/2;
  const PLANET_R=200,PAD=16;
  const tl=document.getElementById('tracklist-win');
  const g=document.getElementById('gallery-win');
  const pl=document.getElementById('player-win');
  const tlW=Math.min(270,Math.max(220,(cx-PLANET_R-PAD)*0.9));
  const tlH=Math.min(520,usableH-2*PAD);
  const gW=Math.min(300,Math.max(220,(vw-cx-PLANET_R-PAD)*0.9));
  const gH=Math.min(460,usableH-2*PAD);
  const plW=Math.min(380,Math.max(300,vw*0.28));
  const plH=270;
  tl.style.width=tlW+'px';tl.style.height=tlH+'px';
  g.style.width=gW+'px';g.style.height=gH+'px';
  pl.style.width=plW+'px';pl.style.height=plH+'px';
  tl.style.left=Math.max(PAD,cx-PLANET_R-tlW-12)+'px';
  tl.style.top=Math.max(PAD,cy-tlH/2)+'px';
  g.style.left=Math.min(vw-gW-PAD,cx+PLANET_R+12)+'px';
  g.style.top=Math.max(PAD,cy-gH/2)+'px';
  pl.style.left=Math.max(PAD,cx-plW/2)+'px';
  pl.style.top=Math.max(PAD,Math.min(usableH-plH-PAD,cy+PLANET_R-20))+'px';
  tl.style.bottom=g.style.bottom=pl.style.bottom='';
  tl.style.right=g.style.right=pl.style.right='';
}

/* ── GALLERY ── */
const GALLERY=[
  {src:'19800879_207324159793930_1257706135595812184_o.jpg'},
  {src:'File_000.png'},
  {src:'JESTR-SQUARE.jpg'},
  {src:'Jesterdaze.png'},
  {src:'Untitled-1.jpg'},
  {src:'bitchesandfire.png'},
  {src:'boyvector.png'},
  {src:'brain.gif'},
  {src:'build_blocks_album.jpg'},
  {src:'buildingblocks.jpg'},
  {src:'color2.jpg'},
  {src:'dsnatbb_calt.png'},
  {src:'facethefear.png'},
  {src:'jestr dollar.jpg'},
  {src:'jestr-square.png'},
  {src:'jestr-untitled.png'},
  {src:'jstar.png'},
  {src:'jstr.jpg'},
  {src:'lightning-2020square.png'},
  {src:'mandala.jpg'},
  {src:'scratchyjstr.jpg'},
];
function renderGallery(){
  const grid=document.getElementById('gw-grid');if(!grid)return;
  grid.innerHTML=GALLERY.map((g,i)=>`<div class="gallery-item" data-gi="${i}"><img src="${g.src}" alt="" loading="lazy"/></div>`).join('');
  grid.querySelectorAll('.gallery-item').forEach(el=>{
    const idx=+el.dataset.gi;
    let pressStartTime=0,startX=0,startY=0;
    const LONG_PRESS_MS=350;
    const MOVE_TOL=10;

    el.addEventListener('pointerdown',e=>{
      if(e.pointerType==='touch'){
        pressStartTime=performance.now();
        startX=e.clientX;
        startY=e.clientY;
      }else{
        pressStartTime=0;
      }
    });

    el.addEventListener('pointerup',e=>{
      const now=performance.now();
      if(e.pointerType==='mouse'||e.pointerType==='pen'){
        openImageWin(idx);
        return;
      }
      if(!pressStartTime)return;
      const dt=now-pressStartTime;
      const dx=Math.abs(e.clientX-startX);
      const dy=Math.abs(e.clientY-startY);
      if(dt>=LONG_PRESS_MS&&dx<=MOVE_TOL&&dy<=MOVE_TOL){
        openImageWin(idx);
      }
      pressStartTime=0;
    });

    el.addEventListener('pointercancel',()=>{pressStartTime=0;});
    el.addEventListener('pointermove',e=>{
      if(!pressStartTime)return;
      const dx=Math.abs(e.clientX-startX);
      const dy=Math.abs(e.clientY-startY);
      if(dx>MOVE_TOL||dy>MOVE_TOL){pressStartTime=0;}
    });
  });
}

let _imgIdx=0;
let _imgWinPinned=false;

/* ── IMAGE VIEWER ── */
function openImageWin(idx){
  const win=document.getElementById('image-win');
  _imgIdx=idx;
  document.getElementById('image-win-img').src=GALLERY[idx].src;
  if(!isMob()){
    const vw=window.innerWidth,vh=window.innerHeight;
    const w=Math.min(560,vw-80),h=Math.min(520,vh-120);
    win.style.width=w+'px';win.style.height=h+'px';
    win.style.left=((vw-w)/2)+'px';win.style.top=((vh-h)/2)+'px';
    win.style.bottom='';win.style.right='';
  }
  win.style.display='flex';
  bringToFront('image-win');
}
document.getElementById('close-image-win').addEventListener('click',()=>document.getElementById('image-win').style.display='none');

/* ── IMAGE NAV ── */
function imgNavGo(dir){
  _imgIdx=(_imgIdx+dir+GALLERY.length)%GALLERY.length;
  document.getElementById('image-win-img').src=GALLERY[_imgIdx].src;
}
document.getElementById('img-nav-prev').addEventListener('click',()=>imgNavGo(-1));
document.getElementById('img-nav-next').addEventListener('click',()=>imgNavGo(1));
document.getElementById('img-nav-prev').addEventListener('touchend',e=>{e.preventDefault();imgNavGo(-1);},{passive:false});
document.getElementById('img-nav-next').addEventListener('touchend',e=>{e.preventDefault();imgNavGo(1);},{passive:false});

/* ── SWIPE NAV IN IMAGE VIEWER (MOBILE / TABLET) ── */
(function(){
  const img=document.getElementById('image-win-img');
  let startX=0,startY=0,startTime=0;
  const SWIPE_DIST=50;
  const SWIPE_TIME=600;
  img.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    const t=e.touches[0];
    startX=t.clientX;startY=t.clientY;startTime=performance.now();
  },{passive:true});
  img.addEventListener('touchend',e=>{
    if(e.changedTouches.length!==1)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    const dt=performance.now()-startTime;
    if(dt<=SWIPE_TIME&&Math.abs(dx)>=SWIPE_DIST&&Math.abs(dy)<40){
      if(dx<0)imgNavGo(1);else imgNavGo(-1);
    }
  },{passive:true});
})();

/* ── WINDOW DRAG + RESIZE ── */
function makeWindowDraggable(winId,barId){
  const win=document.getElementById(winId),bar=document.getElementById(barId);
  let mode=null,sx,sy,sl,st,sw,sh;
  function pin(){
    if(isMob())return;
    const r=win.getBoundingClientRect();
    win.style.left=r.left+'px';win.style.top=r.top+'px';
    win.style.width=r.width+'px';win.style.height=(r.height||win.offsetHeight)+'px';
    win.style.bottom='';win.style.right='';
  }
  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
  function startOp(e,m){
    if(isMob())return;
    pin();const r=win.getBoundingClientRect();
    mode=m;sx=e.clientX;sy=e.clientY;sl=r.left;st=r.top;sw=r.width;sh=r.height;
    e.preventDefault();if(e.stopPropagation)e.stopPropagation();
    bringToFront(winId);
  }
  function onMove(e){
    if(!mode)return;
    const dx=e.clientX-sx,dy=e.clientY-sy,mw=240,mh=200,vw=window.innerWidth,vh=window.innerHeight;
    if(mode==='drag'){win.style.left=clamp(sl+dx,0,vw-sw)+'px';win.style.top=clamp(st+dy,0,vh-sh)+'px';}
    else{
      let l=sl,t=st,w=sw,h=sh;
      if(mode==='se'){w=clamp(sw+dx,mw,1200);h=clamp(sh+dy,mh,900);}
      else if(mode==='sw'){const nw=clamp(sw-dx,mw,1200);l=sl+sw-nw;w=nw;h=clamp(sh+dy,mh,900);}
      else if(mode==='ne'){w=clamp(sw+dx,mw,1200);const nh=clamp(sh-dy,mh,900);t=st+sh-nh;h=nh;}
      else if(mode==='nw'){const nw=clamp(sw-dx,mw,1200);l=sl+sw-nw;w=nw;const nh=clamp(sh-dy,mh,900);t=st+sh-nh;h=nh;}
      win.style.left=l+'px';win.style.top=t+'px';win.style.width=w+'px';win.style.height=h+'px';
    }
  }
  function onUp(){mode=null;}
  bar.addEventListener('mousedown',e=>startOp(e,'drag'));
  bar.addEventListener('touchstart',e=>{if(isMob())return;const t=e.touches[0];startOp({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>e.preventDefault(),stopPropagation:()=>{}},'drag');},{passive:false});
  win.querySelectorAll('.win-resize').forEach(el=>{
    el.addEventListener('mousedown',e=>startOp(e,el.dataset.dir));
    el.addEventListener('touchstart',e=>{const t=e.touches[0];startOp({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>e.preventDefault(),stopPropagation:()=>e.stopPropagation()},el.dataset.dir);},{passive:false});
  });
  win.addEventListener('mousedown',()=>bringToFront(winId),{capture:true});
  win.addEventListener('touchstart',()=>bringToFront(winId),{capture:true,passive:true});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',e=>{if(mode){e.preventDefault();const t=e.touches[0];onMove({clientX:t.clientX,clientY:t.clientY});}},{passive:false});
  window.addEventListener('mouseup',onUp);
  window.addEventListener('touchend',onUp);
}

function toggleWin(winId,btnId){

document.getElementById('close-tracklist').addEventListener('click',()=>closeWin('tracklist-win','btn-tracklist','btn-mob-tracks'));

/* ── TRACKS ── */
let TRACKS=[
  {title:'Geronimo',                  artist:'jestR',file:'11 - Geronimo- jestR - 2020.mp3'},
  {title:'Mile High',                 artist:'jestR',file:'3 - Mile High- jestR - 2020.mp3'},
  {title:'Follow The Flow',           artist:'jestR',file:'Mp3-FollowTheFlow.mp3'},
  {title:'Soul Seer',                 artist:'jestR',file:'Mp3-SoulSeer.mp3'},
  {title:'Peace',                     artist:'jestR',file:'Peace.mp3'},
  {title:'Strider',                   artist:'jestR',file:'Strider.mp3'},
  {title:'Insane Membrane',           artist:'jestR',file:'Insane_membrane.mp3'},
  {title:'Wavy',                      artist:'jestR',file:'wavy.mp3'},
  {title:'Boa Constrictor',           artist:'jestR',file:'boaconstrictor.mp3'},
  {title:'News',                      artist:'jestR',file:'Newsss.mp3'},
  {title:'Wheels',                    artist:'jestR',file:'mp3Wheels-36.mp3'},
  {title:'Pop',                       artist:'jestR',file:'pop.mp3'},
  {title:'The Sum Of Hippy Thoughts', artist:'jestR',file:'the sum of hippy thoughts - Output - Stereo Out.mp3'},
  {title:'What Dreams May Come',      artist:'jestR',file:'what_dreams_may_comewavy.wav'},
];

const audio=document.getElementById('audio-player');
let currentIndex=0,isPlaying=false,isShuffle=false,repeatMode=0;
let seekOnReady=null,isSeeking=false,durationPollTimer=null;
let isMuted=false,premuteVolume=80;

function fmt(s){if(s===null||s===undefined||isNaN(s)||!isFinite(s)||s<0)return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function isGoodDuration(d){return typeof d==='number'&&isFinite(d)&&d>0&&d<18000;}
function tryUpdateDuration(){const dur=audio.duration;if(isGoodDuration(dur)){document.getElementById('time-total').textContent=fmt(dur);return true;}return false;}
function startDurationPoll(){
  if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}
  const deadline=Date.now()+30000;
  durationPollTimer=setInterval(()=>{if(tryUpdateDuration()){clearInterval(durationPollTimer);durationPollTimer=null;}else if(Date.now()>=deadline){clearInterval(durationPollTimer);durationPollTimer=null;}},500);
}
function applySavedSeek(){if(seekOnReady!==null&&audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=seekOnReady*audio.duration;seekOnReady=null;tryUpdateDuration();}}
audio.addEventListener('loadedmetadata',()=>{tryUpdateDuration();applySavedSeek();});
audio.addEventListener('canplay',()=>{tryUpdateDuration();applySavedSeek();});
audio.addEventListener('durationchange',()=>{tryUpdateDuration();applySavedSeek();});

function setProgress(pct){document.getElementById('progress-fill').style.width=pct+'%';document.getElementById('progress-thumb').style.left=pct+'%';}
function seekToPct(pct){pct=Math.max(0,Math.min(1,pct));setProgress(pct*100);if(audio.readyState>=1&&isGoodDuration(audio.duration)){audio.currentTime=pct*audio.duration;seekOnReady=null;}else{seekOnReady=pct;}}
function skip(sec){if(audio.readyState>=1&&isGoodDuration(audio.duration))audio.currentTime=Math.max(0,Math.min(audio.duration,(audio.currentTime||0)+sec));}
function clientXToFraction(clientX,rail){const r=rail.getBoundingClientRect();return Math.max(0,Math.min(1,(clientX-r.left)/r.width));}

(function(){
  const rail=document.getElementById('progress-rail');let active=false;
  function apply(e){isSeeking=true;seekToPct(clientXToFraction(e.clientX,rail));}
  rail.addEventListener('pointerdown',e=>{active=true;rail.setPointerCapture(e.pointerId);rail.classList.add('dragging');apply(e);e.preventDefault();},{passive:false});
  rail.addEventListener('pointermove',e=>{if(!active)return;apply(e);},{passive:false});
  rail.addEventListener('pointerup',()=>{active=false;rail.classList.remove('dragging');isSeeking=false;});
  rail.addEventListener('pointercancel',()=>{active=false;rail.classList.remove('dragging');isSeeking=false;});
})();

/* ── VOLUME ── */
const volSlider=document.getElementById('vol-slider');
const volPct=document.getElementById('vol-pct');
const volIcon=document.getElementById('vol-icon');
function volIconName(v,muted){if(muted||v===0)return'volume_off';if(v<40)return'volume_down';return'volume_up';}
function syncVolUI(v,muted){
  volSlider.value=muted?0:v;
  volSlider.style.setProperty('--vol-pct',(muted?0:v)+'%');
  volPct.textContent=(muted?0:Math.round(v))+'%';
  volIcon.textContent=volIconName(v,muted);
  muted?volIcon.classList.add('muted'):volIcon.classList.remove('muted');
}
function setVolume(v){v=Math.max(0,Math.min(100,v));isMuted=false;premuteVolume=v;audio.volume=v/100;syncVolUI(v,false);}
function toggleMute(){
  isMuted=!isMuted;
  if(isMuted){if(audio.volume>0)premuteVolume=audio.volume*100;audio.volume=0;syncVolUI(premuteVolume,true);}
  else{const v=premuteVolume>0?premuteVolume:80;audio.volume=v/100;syncVolUI(v,false);}
}
volSlider.addEventListener('input',()=>setVolume(+volSlider.value));
volSlider.addEventListener('change',()=>setVolume(+volSlider.value));
document.getElementById('vol-icon-wrap').addEventListener('click',e=>{e.stopPropagation();toggleMute();});
document.getElementById('vol-icon-wrap').addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();toggleMute();},{passive:false});

audio.addEventListener('timeupdate',()=>{
  const dur=audio.duration,cur=audio.currentTime;
  if(cur>0&&!isGoodDuration(dur)){if(tryUpdateDuration()&&durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}}
  if(isGoodDuration(dur)){document.getElementById('time-total').textContent=fmt(dur);document.getElementById('time-current').textContent=fmt(cur);if(!isSeeking)setProgress((cur/dur)*100);}else{document.getElementById('time-current').textContent=fmt(cur);}
});
audio.addEventListener('ended',()=>{
  if(repeatMode===2){audio.currentTime=0;audio.play();return;}
  if(repeatMode===1){loadTrack((currentIndex+1)%TRACKS.length,true);return;}
  if(currentIndex<TRACKS.length-1){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):currentIndex+1,true);}else{isPlaying=false;updatePlayIcons();renderAll();}
});

function loadTrack(index,autoplay=false){
  currentIndex=index;seekOnReady=null;isSeeking=false;
  if(durationPollTimer){clearInterval(durationPollTimer);durationPollTimer=null;}
  const t=TRACKS[index];audio.src=t.file;audio.load();startDurationPoll();
  document.getElementById('focal-title').textContent=t.title;
  document.getElementById('focal-artist').textContent=t.artist;
  document.getElementById('fp-title').textContent=t.title;
  document.getElementById('fp-artist').textContent=t.artist;
  setProgress(0);document.getElementById('time-current').textContent='0:00';document.getElementById('time-total').textContent='0:00';
  renderAll();
  if(autoplay){audio.play().then(()=>{isPlaying=true;updatePlayIcons();renderAll();}).catch(()=>{});}else{isPlaying=false;}
  updatePlayIcons();
}

function updateRepeatUI(){
  const btn=document.getElementById('btn-repeat'),icon=document.getElementById('repeat-icon');
  if(repeatMode===0){btn.style.color='var(--baby-blue)';icon.textContent='repeat';btn.title='Repeat Off';btn.classList.remove('active-state');}
  else if(repeatMode===1){btn.style.color='var(--jestr-red)';icon.textContent='repeat';btn.title='Repeat All';btn.classList.add('active-state');}
  else{btn.style.color='var(--jestr-red)';icon.textContent='repeat_one';btn.title='Repeat One';btn.classList.add('active-state');}
}
function updateShuffleUI(){const btn=document.getElementById('btn-shuffle');btn.style.color=isShuffle?'var(--jestr-red)':'var(--baby-blue)';isShuffle?btn.classList.add('active-state'):btn.classList.remove('active-state');}
function updatePlayIcons(){document.getElementById('play-icon').textContent=isPlaying?'pause':'play_arrow';}

/* ── DRAG-TO-REORDER ── */
const dropLine=document.getElementById('drop-line');
let reorderSrcIdx=null;
let reorderInsertAfter=null;

function hideDropLine(){dropLine.style.display='none';}

function showDropLine(afterIdx){
  const items=[...document.querySelectorAll('#sidebar-tracklist .track-item')];
  if(!items.length){hideDropLine();return;}
  let y;
  if(afterIdx<0){
    const r=items[0].getBoundingClientRect();y=r.top-1;
  } else if(afterIdx>=items.length){
    const r=items[items.length-1].getBoundingClientRect();y=r.bottom+1;
  } else {
    const ra=items[afterIdx].getBoundingClientRect();
    const rb=items[afterIdx+1]?items[afterIdx+1].getBoundingClientRect():ra;
    y=(ra.bottom+(rb?rb.top:ra.bottom))/2;
  }
  const list=document.getElementById('sidebar-tracklist');
  const lr=list.getBoundingClientRect();
  dropLine.style.display='block';
  dropLine.style.top=(y-1.5)+'px';
  dropLine.style.left=(lr.left+8)+'px';
  dropLine.style.right=(window.innerWidth-lr.right+8)+'px';
  dropLine.style.width='';
  reorderInsertAfter=afterIdx;
}

function getInsertAfterFromY(clientY){
  const items=[...document.querySelectorAll('#sidebar-tracklist .track-item')];
  if(!items.length)return -1;
  for(let i=0;i<items.length;i++){
    const r=items[i].getBoundingClientRect();
    const mid=r.top+r.height/2;
    if(clientY<mid) return i-1;
  }
  return items.length-1;
}

function doReorder(srcIdx,insertAfter){
  if(srcIdx===null||insertAfter===null)return;
  if(insertAfter===srcIdx||insertAfter===srcIdx-1)return;
  const moved=TRACKS.splice(srcIdx,1)[0];
  let at=insertAfter;
  if(at>srcIdx)at--;
  TRACKS.splice(at+1,0,moved);
  const newIdx=at+1;
  if(srcIdx===currentIndex)currentIndex=newIdx;
  else if(srcIdx<currentIndex&&newIdx>=currentIndex)currentIndex--;
  else if(srcIdx>currentIndex&&newIdx<=currentIndex)currentIndex++;
  renderAll();
}

function trackHTML(t,i,isActive){
  return `<div class="track-item${isActive?' active':''}" data-index="${i}">
    <span class="drag-handle" data-handle="1" title="Drag to reorder">
      <span class="material-symbols-outlined" style="font-size:16px">drag_indicator</span>
    </span>
    <span style="font-size:9px;font-weight:700;color:#6e6875;width:16px;flex-shrink:0;text-align:right">${String(i+1).padStart(2,'0')}</span>
    <div style="flex:1;min-width:0">
      <p class="track-title" style="font-size:11px;font-weight:700;color:${isActive?'#e9e1de':'rgba(233,225,222,.45)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title}</p>
      <p class="track-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:${isActive?'var(--jestr-green)':'rgba(110,104,117,.45)'};margin:0">${t.artist}</p>
    </div>
    ${isActive&&isPlaying?'<span class="material-symbols-outlined" style="font-size:12px;color:var(--jestr-purple);flex-shrink:0">equalizer</span>':''}
  </div>`;
}

function bindTrackListEvents(){
  document.querySelectorAll('#sidebar-tracklist .track-item').forEach(el=>{
    const idx=+el.dataset.index;
    el.addEventListener('click',e=>{if(e.target.closest('[data-handle]'))return;loadTrack(idx,true);});
    const handle=el.querySelector('[data-handle]');
    handle.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      handle.setPointerCapture(e.pointerId);
      handle.classList.add('grabbing');
      reorderSrcIdx=idx;
      el.classList.add('is-dragging');
      showDropLine(idx-1);
    });
    handle.addEventListener('pointermove',e=>{
      if(reorderSrcIdx===null)return;
      e.preventDefault();
      showDropLine(getInsertAfterFromY(e.clientY));
    });
    handle.addEventListener('pointerup',e=>{
      if(reorderSrcIdx===null)return;
      handle.releasePointerCapture(e.pointerId);
      handle.classList.remove('grabbing');
      el.classList.remove('is-dragging');
      doReorder(reorderSrcIdx,reorderInsertAfter);
      reorderSrcIdx=null;reorderInsertAfter=null;
      hideDropLine();
    });
    handle.addEventListener('pointercancel',e=>{
      handle.releasePointerCapture(e.pointerId);
      handle.classList.remove('grabbing');
      el.classList.remove('is-dragging');
      reorderSrcIdx=null;reorderInsertAfter=null;
      hideDropLine();
    });
  });
}

function renderAll(){
  const html=TRACKS.map((t,i)=>trackHTML(t,i,i===currentIndex)).join('');
  document.getElementById('sidebar-tracklist').innerHTML=html;
  document.getElementById('track-count').textContent=TRACKS.length+' TRK';
  bindTrackListEvents();
}

function togglePlay(){
  if(!audio.src||audio.src===window.location.href){loadTrack(0,true);return;}
  if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}
  updatePlayIcons();renderAll();
}
function prevTrack(){if((audio.currentTime||0)>3){audio.currentTime=0;return;}loadTrack((currentIndex-1+TRACKS.length)%TRACKS.length,isPlaying);}
function nextTrack(){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):(currentIndex+1)%TRACKS.length,isPlaying);}

document.getElementById('btn-play').addEventListener('click',togglePlay);
document.getElementById('btn-prev').addEventListener('click',prevTrack);
document.getElementById('btn-next').addEventListener('click',nextTrack);
document.getElementById('btn-back10').addEventListener('click',()=>skip(-10));
document.getElementById('btn-fwd10').addEventListener('click',()=>skip(10));
document.getElementById('btn-download').addEventListener('click',()=>{
  const t=TRACKS[currentIndex];const a=document.createElement('a');a.href=t.file;a.download=t.file;a.click();
});
document.getElementById('btn-shuffle').addEventListener('click',()=>{isShuffle=!isShuffle;updateShuffleUI();});
document.getElementById('btn-repeat').addEventListener('click',()=>{repeatMode=(repeatMode+1)%3;updateRepeatUI();});
document.getElementById('search-input').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('#sidebar-tracklist .track-item').forEach(el=>{
    const t=TRACKS[+el.dataset.index];
    el.style.display=(t&&(t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q)))?'':'none';
  });
});

/* ── INIT ── */
setVolume(80);
updateRepeatUI();
updateShuffleUI();
loadTrack(0,false);
renderGallery();

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  applyDesktopLayout();
  window.addEventListener('resize',applyDesktopLayout);
  ['tracklist-win','player-win','gallery-win'].forEach(id=>{
    document.getElementById(id).style.display='flex';
    bringToFront(id);
  });
  document.getElementById('btn-tracklist').classList.add('win-open');
  document.getElementById('btn-gallery').classList.add('win-open');
  document.getElementById('btn-player').classList.add('win-open');
  setMobActive('btn-mob-tracks',true);
  setMobActive('btn-mob-player',true);
  updateMobPlayerHeight();
}));
</script>
